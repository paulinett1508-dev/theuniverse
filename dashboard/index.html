        for(let i=0;i<12;i++){const x1=Math.random()*sz,y1=Math.random()*sz,x2=x1+(Math.random()-.5)*40,y2=y1+(Math.random()-.5)*40;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle='rgba(180,220,255,.18)';ctx.lineWidth=.6;ctx.stroke();}
      });
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(p.radius,32,32),new THREE.MeshStandardMaterial({map:tc,emissive:new THREE.Color(p.col).multiplyScalar(.08),emissiveIntensity:.5,roughness:.95,metalness:0}));
      mesh.userData={...p,isArchived:true};
      mesh.add(_galGlow(p.radius*2,p.col,.08));
      scene.add(mesh);dm.push(mesh);
    });
    _DELETED.forEach(p=>{
      const grp=new THREE.Group();grp.userData={...p,isDeleted:true};
      grp.add(new THREE.Mesh(new THREE.SphereGeometry(p.radius,24,24),new THREE.MeshBasicMaterial({color:p.col,transparent:true,opacity:.06})));
      grp.add(new THREE.Mesh(new THREE.SphereGeometry(p.radius,12,12),new THREE.MeshBasicMaterial({color:p.col,transparent:true,opacity:.22,wireframe:true})));
      grp.add(_galGlow(p.radius*1.8,p.col,.05));
      scene.add(grp);dm.push(grp);
    });
    // Automacao-de-CND — só partículas escuras no BH
    const N=80,apos=new Float32Array(N*3),ra=_rng(99);
    for(let i=0;i<N;i++){apos[i*3]=_BH_POS.x+(ra()-.5)*12;apos[i*3+1]=_BH_POS.y+(ra()-.5)*12;apos[i*3+2]=_BH_POS.z+(ra()-.5)*12;}
    const absG=new THREE.BufferGeometry();absG.setAttribute('position',new THREE.BufferAttribute(apos,3));
    scene.add(new THREE.Points(absG,new THREE.PointsMaterial({size:.3,color:0x050508,transparent:true,opacity:.15})));
    return dm;
  }

  const _bhRef=_buildBlackHole();
  const _decayMeshes=_buildDecayZone();

  // ── ESTAÇÃO OBI-WAN (agnostic-core) ──────────────────────────────
  function _buildObiWanISS(){
    const grp=new THREE.Group();
    const _m=new THREE.MeshStandardMaterial({color:0x99aabb,emissive:new THREE.Color(0x223344),emissiveIntensity:.28,roughness:.3,metalness:.8});
    const _sm=new THREE.MeshStandardMaterial({color:0x1a3a6a,emissive:new THREE.Color(0x0a1a3a),emissiveIntensity:.18,roughness:.5,metalness:.55});
    // Corpo principal
    const _oc=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.5,8),_m);_oc.rotation.z=Math.PI/2;grp.add(_oc);
    // Treliça
    const _ot=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,1.8,6),_m);_ot.rotation.z=Math.PI/2;grp.add(_ot);
    // 4 painéis solares
    [[-0.7,-0.25],[-0.7,0.25],[0.7,-0.25],[0.7,0.25]].forEach(([x,z])=>{const _op=new THREE.Mesh(new THREE.BoxGeometry(.55,.02,.22),_sm);_op.position.set(x,0,z);grp.add(_op);});
    // Módulos habitacionais
    [-0.15,0,0.15].forEach(z=>{const _om=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.2,8),_m);_om.rotation.z=Math.PI/2;_om.position.z=z;_om.position.y=.06;grp.add(_om);});
    // Antena de monitoramento apontando para o sol
    const _oa=new THREE.Mesh(new THREE.CylinderGeometry(.006,.006,.35,4),new THREE.MeshStandardMaterial({color:0xaaaaaa,emissive:new THREE.Color(0x334455),emissiveIntensity:.3,roughness:.2,metalness:.9}));
    _oa.rotation.z=Math.PI/2;_oa.position.set(-.2,0,0);grp.add(_oa);
    // Glow discreto — ele não quer ser encontrado
    grp.add(_galGlow(.6,0xaabbdd,.25));grp.add(_galGlow(1.4,0x8899aa,.08));
    grp.add(new THREE.PointLight(0x8899cc,.15,5));
    grp.userData={id:'agnostic-core',name:'agnostic-core',colorHex:'#aabbcc',cluster:'exílio',isMoon:false,status:'active',radius:.9};
    return grp;
  }
  const _obiWanPivot=new THREE.Object3D();
  _obiWanPivot.setRotationFromEuler(new THREE.Euler(Math.PI/4,Math.random()*Math.PI*2,0));
  const _obiWanISS=_buildObiWanISS();
  const _OBI_ORBIT=220;
  _obiWanISS.position.set(_OBI_ORBIT,0,0);
  _obiWanPivot.add(_obiWanISS);
  scene.add(_obiWanPivot);
  // trilha orbital — quase invisível
  {const _oOrbPts=[];for(let i=0;i<=96;i++){const a=i/96*Math.PI*2;_oOrbPts.push(new THREE.Vector3(Math.cos(a)*_OBI_ORBIT,0,Math.sin(a)*_OBI_ORBIT));}const _oOrbL=new THREE.Line(new THREE.BufferGeometry().setFromPoints(_oOrbPts),new THREE.LineBasicMaterial({color:0xaabbcc,transparent:true,opacity:.03}));_oOrbL.rotation.x=Math.PI/4;scene.add(_oOrbL);}
  actualMeshes.push(_obiWanISS);

  // ── comet ──
  const cometGroup=new THREE.Group();
  let cometAngle=0;
  (()=>{
    cometGroup.add(new THREE.Mesh(new THREE.SphereGeometry(.35,16,16),new THREE.MeshBasicMaterial({color:0xddeeff})));
    cometGroup.add(_galGlow(2,0x88aaff,.5));
    const N=80,pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){pos[i*3]=i*-.55;pos[i*3+1]=(Math.random()-.5)*.08*i;pos[i*3+2]=(Math.random()-.5)*.08*i;const t=1-i/N;col[i*3]=.7*t;col[i*3+1]=.85*t;col[i*3+2]=t;}
    const tGeo=new THREE.BufferGeometry();tGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));tGeo.setAttribute('color',new THREE.BufferAttribute(col,3));
    cometGroup.add(new THREE.Points(tGeo,new THREE.PointsMaterial({size:.4,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.7})));
    scene.add(cometGroup);
  })();

  // ── meteors ──
  const meteors3=[];let meteorTimer3=0;
  function spawnMeteor3(){
    const a=Math.random()*Math.PI*2,rr=100+Math.random()*130;
    const start=new THREE.Vector3(rr*Math.cos(a),(Math.random()-.5)*40,rr*Math.sin(a));
    const vel=new THREE.Vector3((Math.random()-.5),(Math.random()-.5)*.3,(Math.random()-.5)).normalize().multiplyScalar(1.5+Math.random());
    const len=4+Math.random()*7;
    const pts=[start,start.clone().add(vel.clone().normalize().multiplyScalar(-len))];
    const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.9}));
    scene.add(line);meteors3.push({line,vel,life:0,maxLife:35+Math.random()*25});
  }

  // ── raycaster / interaction ──
  const raycaster=new THREE.Raycaster();
  const mouse=new THREE.Vector2();

  // ── HOVER ──────────────────────────────────────────────────────
  const _hovMouse=new THREE.Vector2();
  let _hovId=null;
  const _tooltipEl=document.getElementById('tip');
  canvas.addEventListener('mousemove',e=>{
    if(_drag){if(_tooltipEl)_tooltipEl.style.opacity='0';return;}
    _hovMouse.x=(e.clientX/innerWidth)*2-1;
    _hovMouse.y=-(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(_hovMouse,camera);
    const hits=raycaster.intersectObjects(actualMeshes,false);
    if(hits.length>0){
      const d=hits[0].object.userData;
      if(_hovId!==d.name){
        _hovId=d.name;
        showTip(e,d);
      }
      if(_tooltipEl){_tooltipEl.style.opacity='1';_tooltipEl.style.left=(e.clientX+16)+'px';_tooltipEl.style.top=(e.clientY-8)+'px';}
      canvas.style.cursor='pointer';
    } else {
      _hovId=null;
      hideTip();
      canvas.style.cursor='grab';
    }
  });
  canvas.addEventListener('mouseleave',()=>{_hovId=null;hideTip();});
  // click handled by canvas.addEventListener('click',...) above

  // ── render loop ──
  let t3=0,animId3=null;
  function animate3(){
    animId3=requestAnimationFrame(animate3);
    const raw=clock.getDelta();                       // segundos reais
    const dt=_galState.paused?0:Math.min(raw,.05)*_galState.speed;
    t3+=raw; // t3 sempre corre (animações cosméticas independentes de pausa)
    if(!_galState.paused){_simYear+=dt*0.015*_galState.speed;_updateClock();}

    // HUD indicador BH
    const _bhScreen=_BH_POS.clone().project(camera);
    const _bhArrow=document.getElementById('bh-arrow');
    if(_bhArrow){
      const _onScreen=Math.abs(_bhScreen.x)<1&&Math.abs(_bhScreen.y)<1;
      if(_onScreen){_bhArrow.style.display='none';}
      else{
        const _ang=Math.atan2(-_bhScreen.y,_bhScreen.x);
        _bhArrow.style.display='block';
        _bhArrow.style.left=(Math.cos(_ang)*(innerWidth/2-60)+innerWidth/2)+'px';
        _bhArrow.style.top=(Math.sin(_ang)*(innerHeight/2-60)+innerHeight/2)+'px';
        _bhArrow.style.transform=`rotate(${_ang}rad)`;
      }
    }

    if(!_galState.paused){
      planetGroups.forEach(group=>{
        const p=group.userData;
        if(p._isStation){
          const sm=group.children[0];
          if(sm)sm.rotateOnAxis(_localY,dt*.8);
          return;
        }
        // ── sistema binário nexus+sbrgestao ──
        if(p._isBinary){
          savedAngles[_GAL_BINARY_KEY]=(savedAngles[_GAL_BINARY_KEY]||0)+_GAL_RINGS[p._galRi].speed*dt;
          const bAng=savedAngles[_GAL_BINARY_KEY];
          group.position.set(Math.cos(bAng)*p._galOrbit,0,Math.sin(bAng)*p._galOrbit);
          // rotação interna: os dois planetas orbitam o baricentro
          group.rotation.y+=dt*0.018;
          // rotação axial dos filhos (os dois planetas)
          group.children.forEach(child=>{
            if(child.isMesh){
              const spinSpeed=.6+((child.userData.magnitude||3)*.08);
              child.rotateOnAxis(_localY,spinSpeed*dt);
            }
          });
          return;
        }
        const ri=p._galRi; if(ri===undefined)return;
        savedAngles[p.name]=(savedAngles[p.name]||0)+_GAL_RINGS[ri].speed*dt;
        const ang=savedAngles[p.name],orbit=p._galOrbit;
        group.position.set(orbit*Math.cos(ang),Math.sin(ang)*orbit*(p._galOrbitTilt||0),orbit*Math.sin(ang));

        const actualMesh=group.children[0];
        if(!actualMesh)return;
        const spinSpeed=p.bodyType==='supernova'?2.5:p.bodyType==='satellite'?1.5:.5+((p.magnitude||3)*.1);
        actualMesh.rotateOnAxis(_localY,spinSpeed*dt);

        if(p.bodyType==='supernova'){
          const pulse=1+.3*Math.sin(t3*4+(p.name.charCodeAt(0)||0)*.7);
          actualMesh.scale.set(pulse,pulse*(1-(_GAL_OB.smooth||0)),pulse);
        }
        if(p.health==='alert'&&actualMesh.material?.emissiveIntensity!==undefined){
          actualMesh.material.emissiveIntensity=.03+.07*Math.abs(Math.sin(t3*3));
        }
      });
    }

    // nebula: nuvem gira sempre (independente de pausa)
    planetGroups.forEach(group=>{
      if(group.userData.bodyType==='nebula') group.rotation.y+=.001;
    });

    // luas: orbitam o planeta-pai em coordenadas locais
    if(!_galState.paused){
      moonGroups.forEach(mg=>{
        const r=mg.userData._moonOrbit||8;
        savedAngles[mg.userData.name+'_m']=(savedAngles[mg.userData.name+'_m']||0)+0.06*dt;
        const a=savedAngles[mg.userData.name+'_m'];
        mg.position.set(Math.cos(a)*r,0,Math.sin(a)*r);
        const mm=mg.children[0];
        if(mm&&mm.userData.name==='luna-base'){
          mm.rotation.y+=dt*.4;
          mm.rotation.x+=dt*.08;
          mm.rotation.z=Math.sin(_simYear*1200*.3)*.05;
          // piscar luzes de status
          mm.children?.forEach(child=>{
            if(!child.userData?.statusLight)return;
            const blink=Math.sin(_simYear*1200*3+child.userData.blinkOffset);
            if(child.material?.color)child.material.color.setHex(blink>.3?child.userData.blinkCol:0x111111);
          });
        } else if(mm){mm.rotateOnAxis(_localY,dt*.8);}
      });
      // pivôs de luas binárias
      moonPivots.forEach(({pivot,moonMesh,orbitSpeed,selfRotSpeed,name})=>{
        pivot.rotateOnWorldAxis(new THREE.Vector3(0,1,0),orbitSpeed*dt);
        if(name==='luna-base'){
          moonMesh.rotation.y+=selfRotSpeed*dt;
          moonMesh.rotation.x+=.08*dt;
          moonMesh.rotation.z=Math.sin(_simYear*1200*.3)*.05;
          moonMesh.children?.forEach(child=>{
            if(!child.userData?.statusLight)return;
            const blink=Math.sin(_simYear*1200*3+child.userData.blinkOffset);
            if(child.material?.color)child.material.color.setHex(blink>.3?child.userData.blinkCol:0x111111);
          });
        } else {
          moonMesh.rotateOnAxis(_localY,selfRotSpeed*dt);
        }
      });
      // buraco negro — disco gira
      _bhRef.disk1.rotation.z+=dt*.12;
      _bhRef.disk2.rotation.z-=dt*.08;
      // Obi-Wan — órbita solar lentíssima
      _obiWanPivot.rotateOnWorldAxis(new THREE.Vector3(0,1,0),dt*.0008*_galState.speed);
      _obiWanISS.rotation.y+=dt*.08*_galState.speed; // painéis giram
      // decay zone — órbitas ao redor do BH
      const _allDecay=[
        ..._ARCHIVED.map((p,i)=>({data:p,mesh:_decayMeshes[i]})),
        ..._DELETED.map((p,i)=>({data:p,mesh:_decayMeshes[_ARCHIVED.length+i]})),
      ];
      _allDecay.forEach(({data,mesh})=>{
        data.orbitAngle+=data.orbitSpeed*dt*_galState.speed*60;
        const a=data.orbitAngle;
        mesh.position.set(_BH_POS.x+Math.cos(a)*data.orbitA,_BH_POS.y+Math.sin(a*.7)*12,_BH_POS.z+Math.sin(a)*data.orbitB);
        if(mesh.userData.isDeleted){mesh.rotation.y+=dt*.05;mesh.rotation.x+=dt*.02;}
      });
    }

    cometAngle+=dt*.2||.0004;
    cometGroup.position.set(Math.cos(cometAngle)*160,Math.sin(cometAngle*.4)*22,Math.sin(cometAngle)*65);
    cometGroup.quaternion.setFromUnitVectors(new THREE.Vector3(1,0,0),new THREE.Vector3().sub(cometGroup.position).normalize().negate());

    meteorTimer3--;
    if(meteorTimer3<=0){spawnMeteor3();meteorTimer3=120+Math.floor(Math.random()*180);}
    for(let i=meteors3.length-1;i>=0;i--){
      const m=meteors3[i];m.life++;
      m.line.material.opacity=Math.sin(m.life/m.maxLife*Math.PI)*.9;
      const pts=m.line.geometry.attributes.position;
      pts.setXYZ(0,pts.getX(0)+m.vel.x,pts.getY(0)+m.vel.y,pts.getZ(0)+m.vel.z);
      pts.setXYZ(1,pts.getX(1)+m.vel.x,pts.getY(1)+m.vel.y,pts.getZ(1)+m.vel.z);
      pts.needsUpdate=true;
      if(m.life>=m.maxLife){scene.remove(m.line);meteors3.splice(i,1);}
    }

    updateCamera();
    _composer.render();
  }
  animate3();

  return{
    start(){if(!animId3)animate3();},
    stop(){if(animId3){cancelAnimationFrame(animId3);animId3=null;}},
    resize(){
      camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
      _composer.setSize(innerWidth,innerHeight);
      if(_bloomPass)_bloomPass.resolution.set(innerWidth,innerHeight);
    },
    rebuild(pList){this.stop();buildPlanetMeshes(pList);_buildLegend(pList);this.start();},
    updateAtm(on){atmospheres.forEach(a=>{a.visible=on;});},
    setAtmIntensity(v){atmospheres.forEach(a=>{if(a.material?.uniforms?.uIntensity)a.material.uniforms.uIntensity.value=v;});},
    setBloom(v){if(_bloomPass)_bloomPass.strength=v;},
    togglePause(){
      _galState.paused=!_galState.paused;
      const btn=document.getElementById('gc-pause');
      if(btn)btn.textContent=_galState.paused?'▶':'⏸';
    },
    setSpeed(v){
      _galState.speed=_sliderToSpeed(v);
      const lbl=document.getElementById('gc-speed-val');
      if(lbl)lbl.textContent=_fmtSpeed(v);
    },
    setAtm(on){
      _galState.atmosphere=on;
      this.updateAtm(on);
    },
    toggleOrbits(on){
      _galState.showOrbits=on;
      orbitLines.forEach(l=>{l.visible=on;});
    },
    setSunlight(v){if(_sunLight)_sunLight.intensity=v;},
    resetCam(){focusMesh=null;cam.theta=Math.PI/2;cam.phi=.38;cam.radiusGoal=240;cam.targetGoal.set(0,0,0);},
  };
}

function buildGalactic(planets){
  if(typeof THREE==='undefined') return;
  if(!_gal){
    _gal=_galInitScene(planets);
    _galLastPlanets=planets;
  } else if(planets!==_galLastPlanets){
    _gal.rebuild(planets);
    _galLastPlanets=planets;
  } else {
    _gal.start();
  }
}

function stepGalactic(){} // Three.js usa RAF próprio

function resizeGalactic(){if(_gal)_gal.resize();}

function switchView(v){
  if(v===currentView)return;
  currentView=v;
  document.querySelectorAll('.vb').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('wrap').classList.toggle('galactic',v==='galactic');
  const gc=document.getElementById('gal-canvas');
  const gui=document.getElementById('gal-ui');
  const clk=document.getElementById('gal-clock');
  const leg=document.getElementById('gal-legend');
  if(v==='galactic'){
    gc.style.display='block';gc.style.pointerEvents='auto';
    if(gui)gui.classList.add('visible');
    if(clk)clk.classList.add('visible');
    if(leg)leg.classList.add('visible');
    document.getElementById('stars').style.display='none';
    if(allPlanets.length)buildGalactic(allPlanets);
  } else {
    gc.style.display='none';gc.style.pointerEvents='none';
    if(gui)gui.classList.remove('visible');
    if(clk)clk.classList.remove('visible');
    if(leg)leg.classList.remove('visible');
    document.getElementById('stars').style.display='block';
    if(_gal)_gal.stop();
    if(allPlanets.length){buildOrbit(allPlanets);resizeOrbit();}
  }
}

// ── UI controls wiring ──
(function(){
  // impedir que eventos dos controles vazem para o canvas
  const _galUiEl=document.getElementById('gal-ui');
  if(_galUiEl){
    _galUiEl.addEventListener('mousedown',e=>e.stopPropagation());
    _galUiEl.addEventListener('touchstart',e=>e.stopPropagation(),{passive:false});
    _galUiEl.addEventListener('wheel',e=>e.stopPropagation());
  }

  const pauseBtn=document.getElementById('gc-pause');
  const speedSlider=document.getElementById('gc-speed');
  const atmBtn=document.getElementById('gc-atm');
  const orbitsBtn=document.getElementById('gc-orbits');
  const bloomSlider=document.getElementById('gc-bloom');
  const atmSlider=document.getElementById('gc-atm-sl');

  if(pauseBtn) pauseBtn.addEventListener('click',()=>{if(_gal)_gal.togglePause();});
  if(speedSlider){
    speedSlider.value=50; // centro = 1×
    speedSlider.addEventListener('input',e=>{if(_gal)_gal.setSpeed(+e.target.value);});
  }
  if(bloomSlider){
    bloomSlider.addEventListener('input',e=>{
      const v=parseFloat(e.target.value);
      if(_gal)_gal.setBloom(v);
      const lbl=document.getElementById('gc-bloom-val');
      if(lbl)lbl.textContent=v.toFixed(1);
    });
  }
  if(atmSlider){
    atmSlider.addEventListener('input',e=>{
      const v=parseFloat(e.target.value);
      if(_gal)_gal.setAtmIntensity(v);
      const lbl=document.getElementById('gc-atm-val');
      if(lbl)lbl.textContent=v.toFixed(1);
    });
  }
  const sunlightSlider=document.getElementById('gc-sunlight');
  if(sunlightSlider){
    sunlightSlider.addEventListener('input',e=>{
      const v=parseFloat(e.target.value);
      if(_gal)_gal.setSunlight(v);
      const lbl=document.getElementById('gc-sunlight-val');
      if(lbl)lbl.textContent=v.toFixed(1);
    });
  }
  if(atmBtn) atmBtn.addEventListener('click',()=>{
    if(!_gal)return;
    _galState.atmosphere=!_galState.atmosphere;
    _gal.setAtm(_galState.atmosphere);
    atmBtn.classList.toggle('active',_galState.atmosphere);
  });
  if(orbitsBtn) orbitsBtn.addEventListener('click',()=>{
    if(!_gal)return;
    _galState.showOrbits=!_galState.showOrbits;
    _gal.toggleOrbits(_galState.showOrbits);
    orbitsBtn.classList.toggle('active',_galState.showOrbits);
  });

  // ── keyboard shortcuts (só activos na visão galáctica) ──
  // Space, Escape, F, ArrowRight/Left tratados dentro de _galInitScene
  document.addEventListener('keydown',e=>{
    if(currentView!=='galactic')return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='+'||e.key==='='){
      if(speedSlider){speedSlider.value=Math.min(100,+speedSlider.value+5);if(_gal)_gal.setSpeed(+speedSlider.value);}
    }
    else if(e.key==='-'){
      if(speedSlider){speedSlider.value=Math.max(0,+speedSlider.value-5);if(_gal)_gal.setSpeed(+speedSlider.value);}
    }
    else if(e.key==='o'||e.key==='O'){if(orbitsBtn)orbitsBtn.click();}
    else if(e.key==='a'||e.key==='A'){if(atmBtn)atmBtn.click();}
    else if(e.key==='r'||e.key==='R'){if(_gal)_gal.resetCam();}
  });
})();

// ═══════════════════════════════════════════════════════
// SIDE CARD
// ═══════════════════════════════════════════════════════
const panel=document.getElementById('panel');
const panelBody=document.getElementById('panel-body');
let panelOpen=false, selectedWrapper=null;

const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const _CARD_STATUS={
  active:  {label:'ativo',         color:'#22cc66'},
  recent:  {label:'push recente',  color:'#88cc22'},
  supernova:{label:'encerrando',   color:'#ff4400'},
  archived:{label:'arquivado',     color:'#888866'},
  alert:   {label:'alerta',        color:'#ff2244'},
};
const _SURFACE_LABEL={giant:'Gigante Gasoso',banded:'Anelado',continental:'Continental',rocky:'Rochoso',smooth:'Gasoso'};

function buildCardHTML(p){
  const col=p.colorHex||'#8090c0';
  const st=_CARD_STATUS[p.status]||_CARD_STATUS.active;
  const cluster=p.cluster||'';
  const persona=_GAL_PERSONA[p.name];
  const surface=_SURFACE_LABEL[persona?.surface]||(bodyTypeLabel[p.bodyType]||'planeta');
  const hasRings=!!(persona?.rings);
  const hasAtm=!(persona?.noAtm);
  const orbit=p._galOrbit;
  const lang=p.lang?.name||null;
  const ghUrl=`https://github.com/paulinett1508-dev/${esc(p.name)}`;
  return`
    <div class="card-header">
      <div class="card-dot" style="background:${col};box-shadow:0 0 12px 4px ${col}44"></div>
      <div class="card-title-block">
        <div class="card-name">${esc(p.name)}</div>
        ${cluster?`<div class="card-cluster">${cluster}</div>`:''}
      </div>
    </div>
    <div class="card-status">
      <span class="status-dot" style="background:${st.color}"></span>
      <span style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:${st.color}">${st.label}</span>
    </div>
    <div class="card-divider"></div>
    <div class="card-section">
      <div class="card-section-title">Características</div>
      <div class="card-row"><span class="card-key">Tipo</span><span class="card-val">${surface}</span></div>
      <div class="card-row"><span class="card-key">Anéis</span><span class="card-val">${hasRings?'sim':'não'}</span></div>
      <div class="card-row"><span class="card-key">Atmosfera</span><span class="card-val">${hasAtm?'presente':'ausente'}</span></div>
    </div>
    <div class="card-divider"></div>
    <div class="card-section">
      <div class="card-section-title">Repositório</div>
      <div class="card-row"><span class="card-key">Último push</span><span class="card-val">${daysStr(p.daysSincePush)}</span></div>
      ${lang?`<div class="card-row"><span class="card-key">Linguagem</span><span class="card-val">${esc(lang)}</span></div>`:''}
      <div class="card-row"><span class="card-key">Issues</span><span class="card-val">${p.issues||0}</span></div>
      <div class="card-row"><span class="card-key">Commits</span><span class="card-val">${(p.commits||0).toLocaleString()}</span></div>
      ${p.ci?`<div class="card-row"><span class="card-key">CI</span><span class="card-val">${esc(p.ci)}</span></div>`:''}
    </div>
    ${orbit?`<div class="card-divider"></div>
    <div class="card-section">
      <div class="card-section-title">Órbita</div>
      <div class="card-row"><span class="card-key">Raio</span><span class="card-val">${orbit} u</span></div>
    </div>`:''}
    <a class="card-gh-btn" href="${ghUrl}" target="_blank" rel="noopener">Ver no GitHub ↗</a>`;
}

function openPanel(p,wrapper){
  hideTip();
  if(selectedWrapper)selectedWrapper.classList.remove('selected');
  selectedWrapper=wrapper; if(wrapper) wrapper.classList.add('selected');

  panelBody.innerHTML=buildCardHTML(p);
  panel.classList.add('open');
  document.body.classList.add('panel-open');
  panelOpen=true;
}

function closePanel(){
  stopPlanetAnim();
  panel.classList.remove('open');
  document.body.classList.remove('panel-open');
  panelOpen=false;
  if(selectedWrapper){selectedWrapper.classList.remove('selected');selectedWrapper=null;}
}

document.getElementById('panel-close').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()});
document.getElementById('wrap').addEventListener('click',e=>{
  if(panelOpen&&!e.target.closest('.pw'))closePanel();
});

let touchStartY=0;
panel.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
panel.addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-touchStartY>60)closePanel();
},{passive:true});

// ═══════════════════════════════════════════════════════
// STATS BAR
// ═══════════════════════════════════════════════════════
function updateStats(planets){
  const cnt=h=>planets.filter(p=>p.health===h).length;
  document.getElementById('st').textContent=planets.length;
  document.getElementById('sh').textContent=cnt('healthy');
  document.getElementById('sw').textContent=cnt('warning');
  document.getElementById('sa').textContent=cnt('alert');
  const alerts=planets.filter(p=>p.health==='alert');
  const el=document.getElementById('alerts');
  if(alerts.length){
    el.innerHTML=alerts.map(p=>`<span class="ai">💥 Estrela da Morte · ${p.name}</span>`).join(' &nbsp;·&nbsp; ');
  } else {
    el.innerHTML='✨ Órbita estável — sem ameaças ativas';
    el.style.color='#2a4030';
  }
}

// ═══════════════════════════════════════════════════════
// LIVE EVENTS — polling + visual effects
// ═══════════════════════════════════════════════════════
const seenEvents = new Set();

const FX_DUR = { push:1600, pr:2800, pr_merged:2800, issue:2400, create:1800 };

function triggerEffect(repoName, type){
  const wrapper = univ.querySelector(`[data-planet="${repoName}"]`);
  if(!wrapper) return;
  const dot = wrapper.querySelector('.pd');
  if(!dot) return;

  const cls = type==='pr_merged'?'fx-pr': type==='issue'?'fx-issue': type==='create'?'fx-create':'fx-push';
  // remove any existing effect first
  dot.classList.remove('fx-push','fx-pr','fx-issue','fx-create');
  // force reflow so animation restarts
  void dot.offsetWidth;
  dot.classList.add(cls);
  const dur = FX_DUR[type] || 1600;
  setTimeout(()=>dot.classList.remove(cls), dur);
}

async function pollEvents(){
  try{
    const res = await fetch('/api/events');
    if(!res.ok) return;
    const {events=[]} = await res.json();
    for(const ev of events){
      if(seenEvents.has(ev.id)) continue;
      seenEvents.add(ev.id);
      triggerEffect(ev.repo, ev.type);
    }
    // cap set size
    if(seenEvents.size > 300){
      [...seenEvents].slice(0, seenEvents.size-300).forEach(id=>seenEvents.delete(id));
    }
  }catch(_){}
}

// ═══════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════
function loop(){
  if(currentView==='orbital') stepPlanets(); else stepGalactic();
  drawBg();
  requestAnimationFrame(loop);
}

async function loadPlanets(){
  try{
    const res=await fetch('/api/planets');
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    document.getElementById('loader').style.display='none';
    if(data.updatedAt){
      const d=new Date(data.updatedAt);
      document.getElementById('upd').textContent=
        `atualizado ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
    }
    return data.planets||[];
  }catch(e){
    document.getElementById('loader').textContent='erro — '+e.message;
    return[];
  }
}

async function main(){
  cometCd=200+Math.floor(Math.random()*300);
  meteorCd=80+Math.floor(Math.random()*120);
  const planets=await loadPlanets();
  if(planets.length){allPlanets=planets;updateStats(planets);}
  switchView('galactic');
  loop();

  document.querySelectorAll('.vb').forEach(b=>
    b.addEventListener('click',()=>switchView(b.dataset.view))
  );

  setInterval(async()=>{
    const fresh=await loadPlanets();
    if(fresh.length){
      allPlanets=fresh; updateStats(fresh);
      if(currentView==='orbital') buildOrbit(fresh); else buildGalactic(fresh);
    }
  },5*60*1000);

  setTimeout(()=>{
    pollEvents();
    setInterval(pollEvents,8_000);
  },10_000);
}

window.addEventListener('resize',()=>{
  initStars();
  if(currentView==='orbital') resizeOrbit(); else resizeGalactic();
});
main();
</script>
