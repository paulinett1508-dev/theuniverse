<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theuniverse · observatório</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;color:#c8ceff;font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}

/* header */
#hdr{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(100,120,200,.15);background:rgba(3,3,8,.88);backdrop-filter:blur(12px);flex-shrink:0;gap:12px}
#hdr h1{font-size:14px;letter-spacing:3px;color:#fff;text-transform:uppercase;white-space:nowrap}
#hdr h1 em{color:#7b8cff;font-style:normal}
#stats{display:flex;gap:14px;font-size:11px;color:#5a6090;flex-wrap:wrap;justify-content:flex-end}
.sv{font-weight:bold;color:#c8ceff}
.sg{color:#00ff88}.sy{color:#ffcc00}.sr{color:#ff4466}
.stat-hide-sm{display:inline}

/* orbit area */
#wrap{flex:1;position:relative;z-index:5;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:padding .32s cubic-bezier(.22,1,.36,1)}
#univ{position:relative}
.ring{position:absolute;border:1px solid rgba(80,100,180,.13);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* sun */
#sun{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:radial-gradient(circle,#fff8cc 0%,#ffd700 40%,#ff8c00 75%,transparent 100%);box-shadow:0 0 20px #ffd700,0 0 50px rgba(255,200,0,.35),0 0 100px rgba(255,140,0,.15);animation:sun-pulse 5s ease-in-out infinite;z-index:30;cursor:default}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 20px #ffd700,0 0 50px rgba(255,200,0,.35),0 0 100px rgba(255,140,0,.15)}50%{box-shadow:0 0 30px #ffd700,0 0 70px rgba(255,200,0,.5),0 0 130px rgba(255,140,0,.22)}}

/* planets */
.pw{position:absolute;top:0;left:0;transform:translate(calc(var(--px) - 50%), calc(var(--py) - 50%));will-change:transform;z-index:20;cursor:pointer}
.pd{position:relative;overflow:visible;border-radius:50%;transition:transform .15s;width:calc(var(--mag,9) * 1px);height:calc(var(--mag,9) * 1px)}
.pw:hover .pd,.pw:active .pd{transform:scale(2.2)}
.pd.healthy{background:#00ff88;box-shadow:0 0 6px #00ff88,0 0 14px rgba(0,255,136,.4)}
.pd.healthy-v1{background:#00ddaa;box-shadow:0 0 6px #00ddaa,0 0 15px rgba(0,221,170,.42)}
.pd.healthy-v2{background:#44ff66;box-shadow:0 0 6px #44ff66,0 0 15px rgba(68,255,102,.42)}
.pd.healthy-v3{background:#00cc88;box-shadow:0 0 6px #00cc88,0 0 15px rgba(0,204,136,.42)}
.pd.healthy-v4{background:#77ff44;box-shadow:0 0 7px #77ff44,0 0 16px rgba(119,255,68,.42)}
.pd.healthy-v5{background:#22ee99;box-shadow:0 0 6px #22ee99,0 0 15px rgba(34,238,153,.42)}
.pd.warning{background:#ffcc00;box-shadow:0 0 6px #ffcc00,0 0 14px rgba(255,204,0,.4)}
.pd.warning-v1{background:#ffaa00;box-shadow:0 0 6px #ffaa00,0 0 15px rgba(255,170,0,.42)}
.pd.warning-v2{background:#f0dd00;box-shadow:0 0 6px #f0dd00,0 0 15px rgba(240,221,0,.42)}
.pd.warning-v3{background:#ffbb33;box-shadow:0 0 6px #ffbb33,0 0 15px rgba(255,187,51,.42)}
.pd.warning-v4{background:#ff9922;box-shadow:0 0 6px #ff9922,0 0 16px rgba(255,153,34,.42)}
.pd.warning-v5{background:#eecc11;box-shadow:0 0 6px #eecc11,0 0 15px rgba(238,204,17,.42)}
.pd.alert{background:#ff4466;box-shadow:0 0 8px #ff4466,0 0 22px rgba(255,68,102,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v1{background:#ff2244;box-shadow:0 0 8px #ff2244,0 0 22px rgba(255,34,68,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v2{background:#ff6633;box-shadow:0 0 8px #ff6633,0 0 22px rgba(255,102,51,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v3{background:#ff3355;box-shadow:0 0 8px #ff3355,0 0 22px rgba(255,51,85,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v4{background:#ee1144;box-shadow:0 0 9px #ee1144,0 0 24px rgba(238,17,68,.65);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v5{background:#ff5522;box-shadow:0 0 8px #ff5522,0 0 22px rgba(255,85,34,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.dormant{background:#1e1e38;box-shadow:0 0 3px #3a3a60}
.pw.selected .pd{transform:scale(1.8);outline:2px solid rgba(255,255,255,.9);outline-offset:3px;box-shadow:0 0 0 5px rgba(255,255,255,.15),0 0 20px rgba(255,255,255,.3) !important;animation:none !important}
@keyframes pulse-r{0%,100%{box-shadow:0 0 8px #ff4466,0 0 22px rgba(255,68,102,.6)}50%{box-shadow:0 0 16px #ff4466,0 0 44px rgba(255,68,102,.85),0 0 66px rgba(255,68,102,.3)}}

/* ── live event effects ── */

/* push: flash branco + anel shockwave */
.pd.fx-push{animation:fx-push-dot 1.6s ease-out forwards !important}
@keyframes fx-push-dot{
  0%  {transform:scale(1);filter:brightness(1)}
  12% {transform:scale(3);filter:brightness(7)}
  100%{transform:scale(1);filter:brightness(1)}
}
.pd.fx-push::after{
  content:'';position:absolute;
  top:0;left:0;width:100%;height:100%;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  animation:fx-ripple 1.6s ease-out forwards;
  pointer-events:none;
}
@keyframes fx-ripple{
  0%  {transform:scale(1);opacity:1}
  100%{transform:scale(9);opacity:0}
}

/* PR: pulso laranja caloroso */
.pd.fx-pr{animation:fx-pr 2.8s ease-in-out forwards !important}
@keyframes fx-pr{
  0%,100%{filter:brightness(1)}
  30%,70%{filter:brightness(4) sepia(.6) hue-rotate(-10deg);transform:scale(2.4)}
}
.pd.fx-pr::after{
  content:'';position:absolute;
  top:0;left:0;width:100%;height:100%;
  border-radius:50%;
  border:2px solid rgba(255,180,0,.85);
  animation:fx-pr-ring 2.8s ease-in-out forwards;
  pointer-events:none;
}
@keyframes fx-pr-ring{
  0%,100%{transform:scale(1);opacity:0}
  20%    {transform:scale(1);opacity:1}
  80%    {transform:scale(5);opacity:0}
}

/* Issue: pisco âmbar suave */
.pd.fx-issue{animation:fx-issue 2.4s ease-in-out forwards !important}
@keyframes fx-issue{
  0%,100%{filter:brightness(1)}
  25%,75%{filter:brightness(3) sepia(1);transform:scale(1.9)}
}

/* Create/tag: esverdeado */
.pd.fx-create{animation:fx-create 1.8s ease-out forwards !important}
@keyframes fx-create{
  0%  {filter:brightness(1)}
  20% {filter:brightness(5) hue-rotate(120deg);transform:scale(2.5)}
  100%{filter:brightness(1)}
}

/* tooltip */
#tip{position:fixed;z-index:100;background:rgba(8,8,22,.96);border:1px solid rgba(100,120,255,.25);border-radius:8px;padding:10px 14px;font-size:11.5px;pointer-events:none;opacity:0;transition:opacity .12s;max-width:210px;backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,.6)}
#tip.on{opacity:1}
.tn{font-size:13px;font-weight:bold;color:#fff;margin-bottom:5px}
.tr{color:#6070a0;margin-bottom:2px}.tr b{color:#c8ceff;font-weight:normal}
.th{font-size:11px;margin-bottom:4px}
.th.healthy{color:#00ff88}.th.warning{color:#ffcc00}.th.alert{color:#ff4466}.th.dormant{color:#3a3a60}

/* side panel */
#panel{position:fixed;top:0;right:0;width:270px;height:100%;z-index:200;background:rgba(5,5,16,.96);border-left:1px solid rgba(100,120,255,.18);backdrop-filter:blur(18px);box-shadow:-12px 0 40px rgba(0,0,0,.7);transform:translateX(110%);transition:transform .32s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow:hidden}
#panel.open{transform:translateX(0)}
body.panel-open #wrap{padding-right:270px}
#panel-handle{display:none}
#panel-close{position:absolute;top:14px;right:16px;background:none;border:none;color:#4a5080;font-size:18px;cursor:pointer;line-height:1;transition:color .15s;z-index:5}
#panel-close:hover{color:#c8ceff}
#panel-body{flex:1;overflow-y:auto;padding:0 0 24px}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-thumb{background:rgba(100,120,200,.25);border-radius:2px}

/* planet canvas in panel */
#planet-wrap{position:relative;width:100%;background:#000008;overflow:hidden;flex-shrink:0}
#planet-wrap canvas{display:block;width:100%;height:auto}

/* panel text */
.pn-info{padding:16px 22px}
.pn-name{font-size:15px;font-weight:bold;color:#fff;letter-spacing:1px;margin-bottom:5px;word-break:break-all}
.pn-health{font-size:11px;margin-bottom:14px}
.pn-health.healthy{color:#00ff88}.pn-health.warning{color:#ffcc00}.pn-health.alert{color:#ff4466}.pn-health.dormant{color:#3a3a60}
.pn-sep{border:none;border-top:1px solid rgba(100,120,200,.1);margin:12px 0}
.pn-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;font-size:12px}
.pn-label{color:#4a5888}.pn-val{color:#c8ceff;text-align:right}
.pn-stars{color:#7b8cff;letter-spacing:1px}
.pn-gh{display:block;margin-top:16px;text-align:center;padding:9px;border:1px solid rgba(100,120,255,.25);border-radius:6px;color:#7b8cff;font-size:11px;text-decoration:none;transition:background .15s,color .15s;letter-spacing:1px}
.pn-gh:hover{background:rgba(100,120,255,.12);color:#c8ceff}

/* bottom bar */
#bar{position:relative;z-index:10;background:rgba(3,3,8,.88);border-top:1px solid rgba(100,120,200,.12);padding:7px 20px;font-size:11px;backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:30px}
.ai{color:#ff4466;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
#upd{margin-left:auto;color:#3a4060;white-space:nowrap}
#loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#3a4060;font-size:12px;z-index:50;letter-spacing:2px}

/* ── responsive ── */
@media(max-width:900px) and (min-width:601px){
  #panel{width:230px}
  body.panel-open #wrap{padding-right:230px}
}
@media(max-width:600px){
  .stat-hide-sm{display:none}
  #hdr h1{font-size:12px;letter-spacing:2px}
  #stats{gap:10px;font-size:10px}
  #panel{width:100%;height:60vh;top:auto;bottom:0;right:0;border-left:none;border-top:1px solid rgba(100,120,255,.2);box-shadow:0 -8px 32px rgba(0,0,0,.7);transform:translateY(110%);border-radius:14px 14px 0 0}
  #panel.open{transform:translateY(0)}
  body.panel-open #wrap{padding-right:0 !important;padding-bottom:60vh}
  #panel-handle{display:block;width:36px;height:4px;background:rgba(100,120,200,.3);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
  #panel-body{padding:0 0 24px}
  .pn-info{padding:12px 18px}
  #tip{display:none}
  #bar{font-size:10px;padding:5px 14px}
}
@media(max-width:380px){
  #hdr h1{letter-spacing:1px;font-size:11px}
  #stats{display:none}
}

/* ── view toggle ── */
#view-btns{display:flex;gap:5px;flex-shrink:0}
.vb{background:none;border:1px solid rgba(100,120,200,.18);border-radius:4px;color:#3a4070;font-size:11px;cursor:pointer;padding:3px 9px;transition:all .15s;letter-spacing:.5px;font-family:inherit;white-space:nowrap}
.vb.active{border-color:rgba(100,120,200,.5);color:#c8ceff;background:rgba(100,120,200,.07)}
.vb:hover:not(.active){color:#7880a8;border-color:rgba(100,120,200,.3)}

/* ── vista galáctica: Three.js toma conta, DOM some ── */
#three-canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:8;pointer-events:none}
#wrap.galactic #univ{display:none}

/* ── body types ── */
.body-station .pd{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);border-radius:0;background:linear-gradient(135deg,#9ab2d0 0%,#4a6888 55%,#2a3e58 100%);box-shadow:0 0 8px rgba(130,170,220,.7),0 0 24px rgba(70,110,200,.35);animation:station-spin 28s linear infinite}
@keyframes station-spin{to{rotate:1turn}}
.pw.body-station:hover .pd,.pw.body-station.selected .pd{transform:scale(2.2)}
.body-satellite .pd{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);border-radius:0;background:linear-gradient(135deg,#b8c8d8 0%,#6888a0 100%);box-shadow:0 0 5px rgba(160,185,210,.5)}
.body-supernova .pd{background:radial-gradient(circle,#fff8e0 0%,#ffa000 40%,#ff3300 80%,#660000 100%)!important;box-shadow:0 0 12px #ff8800,0 0 36px rgba(255,100,0,.7),0 0 70px rgba(255,40,0,.3)!important;animation:supernova-throb .65s ease-in-out infinite!important}
@keyframes supernova-throb{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.6);filter:brightness(1.8)}}
.body-toys .pd{background:linear-gradient(135deg,#ff70b8 0%,#a070ff 50%,#70b8ff 100%);box-shadow:0 0 10px #a070ff,0 0 26px rgba(160,112,255,.38);animation:toys-shift 4s ease-in-out infinite}
@keyframes toys-shift{0%,100%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(45deg) brightness(1.25)}}
.body-observatory .pd{background:#c8d8f8!important;box-shadow:0 0 6px rgba(180,200,255,.7),0 0 18px rgba(140,170,255,.35)!important}
.body-observatory .pd::before{content:'';position:absolute;width:calc(100% + 14px);height:calc(100% + 14px);border:1px dashed rgba(180,210,255,.45);border-radius:50%;top:-7px;left:-7px;pointer-events:none}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="three-canvas"></canvas>

<div id="hdr">
  <h1>the<em>universe</em> &middot; observatório</h1>
  <div id="view-btns">
    <button class="vb active" data-view="orbital" title="Vista orbital">⬡ orbital</button>
    <button class="vb" data-view="galactic" title="Via Láctea">━ galáctica</button>
  </div>
  <div id="stats">
    <span>planetas&nbsp;<span class="sv" id="st">—</span></span>
    <span class="stat-hide-sm">saudáveis&nbsp;<span class="sv sg" id="sh">—</span></span>
    <span class="stat-hide-sm">atenção&nbsp;<span class="sv sy" id="sw">—</span></span>
    <span>☠&nbsp;<span class="sv sr" id="sa">—</span></span>
  </div>
</div>

<div id="wrap">
  <div id="loader">carregando universo&hellip;</div>
  <div id="univ"></div>
</div>

<div id="panel">
  <div id="panel-handle"></div>
  <button id="panel-close" title="fechar (ESC)">✕</button>
  <div id="planet-wrap"></div>
  <div id="panel-body"></div>
</div>

<div id="tip"></div>

<div id="bar">
  <span id="alerts">&#10024; Órbita estável</span>
  <span id="upd"></span>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CANVAS — starfield + comets + meteors
// ═══════════════════════════════════════════════════════
const cnv=document.getElementById('stars'), ctx=cnv.getContext('2d');
let stars=[], comets=[], meteors=[];
let cometCd=0, meteorCd=0;
let dustParticles=[];

function initStars(){
  cnv.width=innerWidth; cnv.height=innerHeight;
  stars=Array.from({length:220},()=>({
    x:Math.random()*cnv.width, y:Math.random()*cnv.height,
    r:Math.random()*1.3, a:Math.random(), da:(Math.random()-.5)*.004,
  }));
  // poeiras cósmicas — visíveis só na vista galáctica
  dustParticles=Array.from({length:340},()=>({
    x:Math.random()*cnv.width, y:Math.random()*cnv.height,
    r:0.5+Math.random()*2.2,
    a:0.04+Math.random()*0.18,
    // deriva lenta para simular o giro galáctico
    vx:(Math.random()-.5)*0.06, vy:(Math.random()-.5)*0.04,
    // cor: mistura entre branco frio, âmbar e lilás
    hue:[210,35,270,45,200][Math.floor(Math.random()*5)],
    sat:[20,40,30,50,10][Math.floor(Math.random()*5)],
  }));
}

// ── Comet ──
function mkComet(){
  // spawn from top/left edges, travel diagonally
  const fromTop=Math.random()>.4;
  const x=fromTop ? Math.random()*cnv.width*1.2-cnv.width*.1 : -20;
  const y=fromTop ? -20 : Math.random()*cnv.height*.6;
  const angle=Math.PI*.18+Math.random()*Math.PI*.22; // ~10–50° from horizontal
  const spd=1.2+Math.random()*2;
  return{
    x, y,
    vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
    len: 120+Math.random()*180,
    w: 1.2+Math.random()*.8,
    life:0, maxLife: Math.max(cnv.width,cnv.height)*1.8/spd,
    warm: Math.random()>.5,  // warm=gold, cool=blue-white
  };
}

function drawComet(c){
  c.life++;
  const prog=c.life/c.maxLife;
  const alpha=Math.sin(prog*Math.PI)*0.75;
  if(alpha<.02) return false;
  const tx=c.x-c.vx*(c.len/Math.hypot(c.vx,c.vy));
  const ty=c.y-c.vy*(c.len/Math.hypot(c.vx,c.vy));
  const g=ctx.createLinearGradient(tx,ty,c.x,c.y);
  const col=c.warm?'255,230,160':'200,215,255';
  g.addColorStop(0,`rgba(${col},0)`);
  g.addColorStop(.7,`rgba(${col},${alpha*.35})`);
  g.addColorStop(1,`rgba(${col},${alpha})`);
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(c.x,c.y);
  ctx.strokeStyle=g; ctx.lineWidth=c.w; ctx.stroke();
  // nucleus glow
  const ng=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.w*4);
  ng.addColorStop(0,`rgba(${col},${alpha})`);
  ng.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ng;
  ctx.beginPath(); ctx.arc(c.x,c.y,c.w*4,0,Math.PI*2); ctx.fill();
  c.x+=c.vx; c.y+=c.vy;
  return c.x<cnv.width+50 && c.y<cnv.height+50 && c.life<c.maxLife;
}

// ── Meteor / bolide ──
function mkMeteor(){
  const x=Math.random()*cnv.width*1.3-cnv.width*.15;
  const y=Math.random()*cnv.height*.55;
  const spd=10+Math.random()*14;
  const angle=Math.PI*.08+Math.random()*Math.PI*.18;
  return{
    x, y,
    vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
    life:0, maxLife: 12+Math.random()*16,
  };
}

function drawMeteor(m){
  m.life++;
  const prog=m.life/m.maxLife;
  const alpha=Math.sin(prog*Math.PI);
  if(alpha<.02) return false;
  const steps=5;
  const tx=m.x-m.vx*steps; const ty=m.y-m.vy*steps;
  const g=ctx.createLinearGradient(tx,ty,m.x,m.y);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(.6,`rgba(220,230,255,${alpha*.5})`);
  g.addColorStop(1,`rgba(255,255,255,${alpha})`);
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(m.x,m.y);
  ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
  m.x+=m.vx; m.y+=m.vy;
  return m.life<m.maxLife;
}

function drawBg(){
  ctx.clearRect(0,0,cnv.width,cnv.height);
  // em galactic com Three.js ativo, só o starfield de fundo (sem overlay canvas)

  // spawn
  if(--cometCd<=0){ comets.push(mkComet()); cometCd=420+Math.random()*480; }
  if(--meteorCd<=0){
    const n=1+(Math.random()>.65?1:0)+(Math.random()>.85?1:0);
    for(let i=0;i<n;i++) meteors.push(mkMeteor());
    meteorCd=200+Math.random()*320;
  }
  comets=comets.filter(c=>drawComet(c));
  meteors=meteors.filter(m=>drawMeteor(m));

  // stars
  for(const s of stars){
    s.a=Math.max(.08,Math.min(1,s.a+s.da));
    if(s.a<=.08||s.a>=1)s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,255,${s.a})`; ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════
// PLANET RENDERING
// ═══════════════════════════════════════════════════════
const THEMES={
  healthy:{
    base:['#0a3d2b','#1e8060','#4ecb8e'],
    bands:['#0c5040','#12806a','#0a3d7a','#1460b8','#12a870','#0d4f3c','#186090','#0e6044'],
    atm:'rgba(80,200,255,.22)', glow:'#00ff88',
  },
  warning:{
    base:['#6b3300','#c46200','#f0a040'],

function hashStr(s){
  let h=0;
  for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return Math.abs(h);
}

function hex2rgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

let planetRaf=null, planetRot=0;

function stopPlanetAnim(){
  if(planetRaf){cancelAnimationFrame(planetRaf);planetRaf=null;}
}

function drawObservatory(pc,W,H,planet,rot){
  pc.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.30;
  // atmosphere glow — pale blue-white
  const ag=pc.createRadialGradient(cx,cy,R*.7,cx,cy,R*1.7);
  ag.addColorStop(0,'rgba(140,170,255,.22)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  pc.fillStyle=ag; pc.beginPath(); pc.arc(cx,cy,R*1.7,0,Math.PI*2); pc.fill();
  // sphere
  pc.save(); pc.beginPath(); pc.arc(cx,cy,R,0,Math.PI*2); pc.clip();
  const base=pc.createRadialGradient(cx-R*.35,cy-R*.38,R*.05,cx+R*.2,cy+R*.25,R*1.1);
  base.addColorStop(0,'#d8e8ff'); base.addColorStop(.45,'#8090c8'); base.addColorStop(1,'#202848');
  pc.fillStyle=base; pc.fillRect(0,0,W,H);
  // craters
  const craters=[[-.3,-.25,R*.12],[.2,.35,R*.08],[-.1,.4,R*.06],[.4,-.1,R*.10],[-.45,.15,R*.07]];
  for(const[dx,dy,cr]of craters){
    const cx2=cx+dx*R,cy2=cy+dy*R;
    const cg=pc.createRadialGradient(cx2-cr*.2,cy2-cr*.2,0,cx2,cy2,cr);
    cg.addColorStop(0,'rgba(180,195,240,.15)'); cg.addColorStop(.6,'rgba(80,90,140,.18)'); cg.addColorStop(1,'rgba(40,50,100,.1)');
    pc.fillStyle=cg; pc.beginPath(); pc.ellipse(cx2,cy2,cr,cr*.55,rot*.3,0,Math.PI*2); pc.fill();
  }
  // specular
  const spec=pc.createRadialGradient(cx-R*.38,cy-R*.4,0,cx-R*.38,cy-R*.4,R*.85);
  spec.addColorStop(0,'rgba(255,255,255,.28)'); spec.addColorStop(.5,'rgba(255,255,255,.07)'); spec.addColorStop(1,'rgba(255,255,255,0)');
  pc.fillStyle=spec; pc.fillRect(0,0,W,H);
  // terminator shadow
  const sh=pc.createRadialGradient(cx+R*.3,cy+R*.35,R*.3,cx+R*.2,cy+R*.2,R*1.05);
  sh.addColorStop(0,'rgba(0,0,0,0)'); sh.addColorStop(.6,'rgba(0,0,0,.2)'); sh.addColorStop(1,'rgba(0,0,0,.7)');
  pc.fillStyle=sh; pc.fillRect(0,0,W,H);
  pc.restore();
  // orbiting moon
  const moonR=R*.12, moonDist=R*1.55;
  const mx=cx+moonDist*Math.cos(rot*2.8), my=cy+moonDist*Math.sin(rot*2.8);
  // dashed orbit ring
  pc.save(); pc.setLineDash([3,5]);
  pc.beginPath(); pc.arc(cx,cy,moonDist,0,Math.PI*2);
  pc.strokeStyle='rgba(160,190,255,.25)'; pc.lineWidth=1; pc.stroke();
  pc.restore();
  // moon sphere
  const mg=pc.createRadialGradient(mx-moonR*.3,my-moonR*.3,0,mx,my,moonR);
  mg.addColorStop(0,'#e8eeff'); mg.addColorStop(.6,'#a0b0d0'); mg.addColorStop(1,'#505878');
  pc.beginPath(); pc.arc(mx,my,moonR,0,Math.PI*2); pc.fillStyle=mg; pc.fill();
  // label
  const [gr,gg,gb]=hex2rgb('#6090e0');
  pc.font='10px Courier New'; pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right'; pc.fillText(planet.name,W-10,H-8);
}

function drawStation(pc,W,H,planet,rot){
  pc.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.34;
  // glow
  const ag=pc.createRadialGradient(cx,cy,R*.4,cx,cy,R*1.9);
  ag.addColorStop(0,'rgba(100,150,220,.18)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  pc.fillStyle=ag; pc.beginPath(); pc.arc(cx,cy,R*1.9,0,Math.PI*2); pc.fill();
  pc.save(); pc.translate(cx,cy); pc.rotate(rot*.28);
  // outer ring
  pc.beginPath(); pc.arc(0,0,R*1.18,0,Math.PI*2);
  pc.strokeStyle='rgba(100,150,220,.22)'; pc.lineWidth=1.5; pc.stroke();
  // hex body
  pc.beginPath();
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?pc.moveTo(R*Math.cos(a),R*Math.sin(a)):pc.lineTo(R*Math.cos(a),R*Math.sin(a));}
  pc.closePath();
  const g=pc.createLinearGradient(-R,-R,R,R);
  g.addColorStop(0,'#9ab2d0'); g.addColorStop(.5,'#4a6888'); g.addColorStop(1,'#2a3e58');
  pc.fillStyle=g; pc.fill();
  pc.strokeStyle='rgba(150,190,240,.5)'; pc.lineWidth=1.5; pc.stroke();
  // spokes + mid ring
  pc.strokeStyle='rgba(150,190,240,.18)'; pc.lineWidth=1;
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;pc.beginPath();pc.moveTo(0,0);pc.lineTo(R*Math.cos(a),R*Math.sin(a));pc.stroke();}
  pc.beginPath(); pc.arc(0,0,R*.55,0,Math.PI*2);
  pc.strokeStyle='rgba(150,190,240,.3)'; pc.lineWidth=1; pc.stroke();
  // core hub
  const hub=pc.createRadialGradient(-R*.08,-R*.08,0,0,0,R*.28);
  hub.addColorStop(0,'#7090b8'); hub.addColorStop(1,'#1e3050');
  pc.beginPath(); pc.arc(0,0,R*.28,0,Math.PI*2); pc.fillStyle=hub; pc.fill();
  pc.strokeStyle='rgba(150,190,240,.5)'; pc.lineWidth=1; pc.stroke();
  pc.restore();
  const [gr,gg,gb]=hex2rgb('#6080a8');
  pc.font='10px Courier New'; pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right'; pc.fillText(planet.name,W-10,H-8);
}

function drawSatellite(pc,W,H,planet,rot){
  pc.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.13;
  // faint glow
  const ag=pc.createRadialGradient(cx,cy,R,cx,cy,R*4);
  ag.addColorStop(0,'rgba(120,160,200,.12)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  pc.fillStyle=ag; pc.beginPath(); pc.arc(cx,cy,R*4,0,Math.PI*2); pc.fill();
  pc.save(); pc.translate(cx,cy); pc.rotate(rot*.45);
  // solar panels
  const pw=R*3.2,ph=R*.9;
  [[-1],[1]].forEach(([side])=>{
    const ox=side*(R+2);
    const panelG=pc.createLinearGradient(ox,-ph/2,ox,ph/2);
    panelG.addColorStop(0,'rgba(50,70,120,.9)'); panelG.addColorStop(1,'rgba(30,50,90,.9)');
    pc.fillStyle=panelG; pc.fillRect(ox+(side<0?-pw:0),-ph/2,pw,ph);
    pc.strokeStyle='rgba(80,120,200,.4)'; pc.lineWidth=.6;
    pc.strokeRect(ox+(side<0?-pw:0),-ph/2,pw,ph);
    for(let i=1;i<4;i++){
      const x=ox+(side<0?-pw:0)+i*pw/4;
      pc.beginPath(); pc.moveTo(x,-ph/2); pc.lineTo(x,ph/2);
      pc.strokeStyle='rgba(80,120,180,.25)'; pc.stroke();
    }
    // panel connector
    pc.beginPath(); pc.moveTo(side*R,0); pc.lineTo(ox,0);
    pc.strokeStyle='rgba(150,180,220,.4)'; pc.lineWidth=1; pc.stroke();
  });
  // body (diamond)
  pc.beginPath(); pc.moveTo(0,-R*2); pc.lineTo(R,0); pc.lineTo(0,R*2); pc.lineTo(-R,0); pc.closePath();
  const g=pc.createLinearGradient(-R,-R*2,R,R*2);
  g.addColorStop(0,'#c0ccdc'); g.addColorStop(.5,'#708090'); g.addColorStop(1,'#3a4858');
  pc.fillStyle=g; pc.fill();
  pc.strokeStyle='rgba(160,190,220,.6)'; pc.lineWidth=1; pc.stroke();
  // antenna
  pc.beginPath(); pc.moveTo(0,-R*2); pc.lineTo(0,-R*3.2);
  pc.strokeStyle='rgba(180,200,220,.5)'; pc.lineWidth=1; pc.stroke();
  pc.beginPath(); pc.arc(0,-R*3.2,R*.25,0,Math.PI*2);
  pc.fillStyle='rgba(180,210,240,.7)'; pc.fill();
  pc.restore();
  const [gr,gg,gb]=hex2rgb('#7090a8');
  pc.font='10px Courier New'; pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right'; pc.fillText(planet.name,W-10,H-8);
}

function startPlanetAnim(planet){
  stopPlanetAnim();
  const wrap=document.getElementById('planet-wrap');
  wrap.innerHTML='';
  const W=wrap.clientWidth||260;
  const H=Math.round(W*.72);
  const cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  wrap.appendChild(cv);
  const pc=cv.getContext('2d');
  const seed=hashStr(planet.name);
  const bt=planet.bodyType||'planet';
  const hasRings=(planet.magnitude>=4)&&(seed%3===0)&&bt==='planet';
  planetRot=0;
  function frame(){
    if(bt==='station') drawStation(pc,W,H,planet,planetRot);
    else if(bt==='satellite') drawSatellite(pc,W,H,planet,planetRot);
    else if(bt==='observatory') drawObservatory(pc,W,H,planet,planetRot);
    else drawPlanet(pc,W,H,planet,seed,planetRot,hasRings);
    planetRot+=0.006;
    planetRaf=requestAnimationFrame(frame);
  }
  frame();
}

function drawPlanet(pc,W,H,planet,seed,rot,hasRings){
  pc.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2;
  const R=Math.min(W,H)*(hasRings?.30:.38);
  const bt=planet.bodyType||'planet';
  const thKey=bt==='station'?'station':bt==='satellite'?'satellite':bt==='supernova'?'supernova':bt==='toys'?'toys':bt==='observatory'?'observatory':planet.health;
  const th=THEMES[thKey]||THEMES.dormant;

  // ── atmosphere glow ──
  if(th.atm){
    const ag=pc.createRadialGradient(cx,cy,R*.8,cx,cy,R*1.55);
    ag.addColorStop(0,th.atm);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    pc.fillStyle=ag;
    pc.beginPath(); pc.arc(cx,cy,R*1.55,0,Math.PI*2); pc.fill();
  }

  // ── rings back half (drawn before planet) ──
  if(hasRings) _drawRings(pc,cx,cy,R,th,true);

  // ── planet sphere (clipped) ──
  pc.save();
  pc.beginPath(); pc.arc(cx,cy,R,0,Math.PI*2); pc.clip();

  // base gradient (3D lighting: bright top-left, dark bottom-right)
  const [br,bg,bb]=hex2rgb(th.base[2]);
  const [mr,mg,mb]=hex2rgb(th.base[1]);
  const [dr,dg,db]=hex2rgb(th.base[0]);
  const base=pc.createRadialGradient(cx-R*.35,cy-R*.38,R*.05,cx+R*.2,cy+R*.25,R*1.1);
  base.addColorStop(0,`rgb(${br},${bg},${bb})`);
  base.addColorStop(.45,`rgb(${mr},${mg},${mb})`);
  base.addColorStop(1,`rgb(${dr},${dg},${db})`);
  pc.fillStyle=base; pc.fillRect(0,0,W,H);

  // surface bands (latitude strips, shift with rotation)
  const nBands=th.bands.length;
  for(let i=0;i<nBands;i++){
    const t=(i+.5)/nBands;
    const bandY=cy-R+t*R*2;
    const chord=Math.sqrt(Math.max(0,R*R-(bandY-cy)*(bandY-cy)));
    const xShift=Math.sin(rot*1.2+i*0.8+(seed%100)*.063)*chord*.3;
    const bh=R*.22+Math.sin(seed*0.07+i)*R*.06;
    const op=.12+.13*Math.abs(Math.sin(seed*.11+i*1.3));
    const [cr,cg,cb]=hex2rgb(th.bands[i]);
    pc.globalAlpha=op;
    pc.fillStyle=`rgb(${cr},${cg},${cb})`;
    pc.beginPath();
    pc.ellipse(cx+xShift,bandY,chord*.88,bh,0,0,Math.PI*2);
    pc.fill();
  }
  pc.globalAlpha=1;

  // specular highlight (top-left)
  const spec=pc.createRadialGradient(cx-R*.38,cy-R*.4,0,cx-R*.38,cy-R*.4,R*.85);
  spec.addColorStop(0,'rgba(255,255,255,.22)');
  spec.addColorStop(.5,'rgba(255,255,255,.06)');
  spec.addColorStop(1,'rgba(255,255,255,0)');
  pc.fillStyle=spec; pc.fillRect(0,0,W,H);

  // terminator shadow (bottom-right)
  const shadow=pc.createRadialGradient(cx+R*.3,cy+R*.35,R*.3,cx+R*.2,cy+R*.2,R*1.05);
  shadow.addColorStop(0,'rgba(0,0,0,0)');
  shadow.addColorStop(.6,'rgba(0,0,0,.25)');
  shadow.addColorStop(1,'rgba(0,0,0,.75)');
  pc.fillStyle=shadow; pc.fillRect(0,0,W,H);

  pc.restore();

  // ── rings front half (drawn after planet) ──
  if(hasRings) _drawRings(pc,cx,cy,R,th,false);

  // subtle vignette label
  const [gr,gg,gb]=hex2rgb(th.glow);
  pc.font='10px Courier New';
  pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right';
  pc.fillText(planet.name,W-10,H-8);
}

function _drawRings(pc,cx,cy,R,th,backHalf){
  const rin=R*1.28, rout=R*2.05, ry=R*.14;
  const [gr,gg,gb]=hex2rgb(th.base[1]);
  const startA=backHalf?Math.PI:0;
  const endA=backHalf?Math.PI*2:Math.PI;
  for(let r=rout;r>=rin;r-=3){
    const t=(r-rin)/(rout-rin);
    const alpha=.5*Math.sin(t*Math.PI);
    if(alpha<.04) continue;
    pc.beginPath();
    pc.ellipse(cx,cy,r,ry,0,startA,endA);
    pc.strokeStyle=`rgba(${gr},${gg},${gb},${alpha*.8})`;
    pc.lineWidth=2;
    pc.stroke();
  }
}

// ORBITAL SYSTEM

const RINGS=[{rf:.21,spd:.26},{rf:.33,spd:.165},{rf:.455,spd:.105},{rf:.575,spd:.067}];
let univSz=0, nodes=[], angles=[];
const univ=document.getElementById('univ');
const savedAngles={};
let stationWrapper=null;
let currentView='orbital', allPlanets=[];

function isMobile(){return innerWidth<=600}
function getUnivSz(){
  const w=document.getElementById('wrap');
  return Math.min(w.clientWidth,w.clientHeight)*.92;
}

function _mkWrapper(planet){
  const wrapper=document.createElement('div');
  const bt=planet.bodyType||'planet';
  wrapper.className='pw'+(bt!=='planet'?' body-'+bt:'');
  wrapper.dataset.planet=planet.name;
  const dot=document.createElement('div');
  const baseHealth=bt==='supernova'?'alert':bt==='observatory'?'healthy':planet.health;
  const vIdx=hashStr(planet.name)%6;
  const vClass=vIdx>0&&baseHealth!=='dormant'?` ${baseHealth}-v${vIdx}`:'';
  dot.className=`pd ${baseHealth}${vClass}`;
  const px=8+(((planet.magnitude||3)-1)/4)*18; // 8–26px range
  dot.style.setProperty('--mag',px.toFixed(1));
  wrapper.appendChild(dot);
  wrapper.addEventListener('mouseenter',e=>{if(!panelOpen&&!isMobile())showTip(e,planet)});
  wrapper.addEventListener('mousemove',e=>{if(!panelOpen&&!isMobile())moveTip(e)});
  wrapper.addEventListener('mouseleave',hideTip);
  wrapper.addEventListener('click',()=>openPanel(planet,wrapper));
  return wrapper;
}

function buildOrbit(planets){
  univ.innerHTML=''; nodes=[]; angles=[]; stationWrapper=null;

  // station is fixed near the sun — removed from orbital rings
  const station=planets.find(p=>p.bodyType==='station');
  const orbital=planets.filter(p=>p.bodyType!=='station');

  const sorted=[...orbital].sort((a,b)=>a.daysSincePush-b.daysSincePush);
  // force satellite to innermost ring (ring 0)
  const satIdx=sorted.findIndex(p=>p.bodyType==='satellite');
  if(satIdx>0){const[s]=sorted.splice(satIdx,1);sorted.unshift(s);}

  const total=sorted.length;
  const splits=[Math.round(total*.18),Math.round(total*.26),Math.round(total*.30)];
  splits.push(total-splits[0]-splits[1]-splits[2]);

  for(let ri=0;ri<RINGS.length;ri++){
    const el=document.createElement('div');
    el.className='ring';
    const d=RINGS[ri].rf*2*univSz;
    el.style.width=d+'px'; el.style.height=d+'px';
    univ.appendChild(el);
  }

  let pi=0;
  for(let ri=0;ri<RINGS.length;ri++){
    const count=splits[ri];
    for(let j=0;j<count&&pi<sorted.length;j++,pi++){
      const planet=sorted[pi];
      if(savedAngles[planet.name]===undefined)
        savedAngles[planet.name]=(j/count)*Math.PI*2;

      const wrapper=_mkWrapper(planet);
      wrapper.style.setProperty('--px','0px');
      wrapper.style.setProperty('--py','0px');

      univ.appendChild(wrapper);
      nodes.push({el:wrapper,ri,name:planet.name});
      angles.push(savedAngles[planet.name]);
    }
  }

  // station: fixed hexagonal body near sun
  if(station){
    const sw=_mkWrapper(station);
    sw.style.setProperty('--px','0px');
    sw.style.setProperty('--py','0px');
    univ.appendChild(sw);
    stationWrapper=sw;
    _placeStation();
  }

  const sun=document.createElement('div');
  sun.id='sun'; univ.appendChild(sun);
}

function stepPlanets(){
  const cx=univSz/2, cy=univSz/2;
  for(let i=0;i<nodes.length;i++){
    const {el,ri,name}=nodes[i];
    angles[i]+=RINGS[ri].spd*0.0045;
    savedAngles[name]=angles[i];
    const r=RINGS[ri].rf*univSz;
    const x=cx+r*Math.cos(angles[i]);
    const y=cy+r*Math.sin(angles[i]);
    el.style.setProperty('--px',x+'px');
    el.style.setProperty('--py',y+'px');
  }
}

function _placeStation(){
  if(!stationWrapper||!univSz) return;
  const dist=univSz*.095, angle=Math.PI*.28;
  stationWrapper.style.setProperty('--px',(univSz/2+dist*Math.cos(angle))+'px');
  stationWrapper.style.setProperty('--py',(univSz/2+dist*Math.sin(angle))+'px');
}

function resizeOrbit(){
  univSz=getUnivSz();
  univ.style.width=univSz+'px'; univ.style.height=univSz+'px';
  _placeStation();
}

const THREE_SCALE=720; // órbitas maiores = planetas mais espaçados

function _healthCol(health,bodyType){
  if(bodyType==='station')    return{base:0x4a6888,emissive:0x1a2a40,glow:0x6090b8};
  if(bodyType==='satellite')  return{base:0x5a7890,emissive:0x1e2838,glow:0x7090a8};
  if(bodyType==='supernova')  return{base:0xff6200,emissive:0x661000,glow:0xff9900};
  if(bodyType==='observatory')return{base:0x8898c8,emissive:0x2a3450,glow:0xaab8e0};
  if(bodyType==='toys')       return{base:0x8040e0,emissive:0x2a0880,glow:0xb060ff};
  if(!health||health==='dormant')return{base:0x1e1e38,emissive:0x08081a,glow:0x3a3a60};
  if(health.startsWith('warning'))return{base:0xcc9900,emissive:0x442a00,glow:0xffcc00};
  if(health.startsWith('alert'))  return{base:0xcc2233,emissive:0x440010,glow:0xff4466};
  return{base:0x00aa55,emissive:0x003320,glow:0x00ff88};
}

let _thr=null;

function _initThree(){
  if(_thr||typeof THREE==='undefined') return;
  const canvas=document.getElementById('three-canvas');

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0x000000,0);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,1,8000);
  camera.position.set(0,360,920); // 21° elevação — perspectiva clara sem achatar
  camera.lookAt(0,0,0);

  scene.add(new THREE.PointLight(0xffeebb,3.5,2800,1.5));
  scene.add(new THREE.AmbientLight(0x0a1428,0.7));

  // textura de glow — canvas radial gradient branco→transparente
  const _glowC=document.createElement('canvas'); _glowC.width=_glowC.height=128;
  const _gc=_glowC.getContext('2d');
  const _gg=_gc.createRadialGradient(64,64,0,64,64,64);
  _gg.addColorStop(0,'rgba(255,255,255,1)');_gg.addColorStop(.25,'rgba(255,255,255,.5)');
  _gg.addColorStop(.6,'rgba(255,255,255,.08)');_gg.addColorStop(1,'rgba(255,255,255,0)');
  _gc.fillStyle=_gg; _gc.fillRect(0,0,128,128);
  const glowTex=new THREE.CanvasTexture(_glowC);

  // sol + camadas de glow
  const sunMat=new THREE.MeshStandardMaterial({color:0xffaa22,emissive:0xffcc44,emissiveIntensity:1.5,roughness:.8});
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(44,32,32),sunMat));
  [[90,0xff9900,.10],[150,0xff6600,.045],[240,0xff3300,.018]].forEach(([r,c,o])=>
    scene.add(new THREE.Mesh(
      new THREE.SphereGeometry(r,16,16),
      new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,side:THREE.BackSide,depthWrite:false})
    ))
  );
  // glow sprite do sol
  const sunSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:0xffdd88,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false}));
  sunSprite.scale.set(340,340,1); scene.add(sunSprite);

  // anéis orbitais (torus)
  RINGS.forEach(ring=>{
    const m=new THREE.Mesh(
      new THREE.TorusGeometry(ring.rf*THREE_SCALE,1.8,8,180),
      new THREE.MeshBasicMaterial({color:0x2a3a5a,transparent:true,opacity:.28,depthWrite:false})
    );
    m.rotation.x=Math.PI/2;
    scene.add(m);
  });

  // poeiras cósmicas — BufferGeometry de pontos
  const N=3200,dPos=new Float32Array(N*3),dCol=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const a=Math.random()*Math.PI*2, r=80+Math.pow(Math.random(),.55)*620;
    dPos[i*3]=Math.cos(a)*r; dPos[i*3+1]=(Math.random()-.5)*28; dPos[i*3+2]=Math.sin(a)*r;
    const t=Math.random();
    dCol[i*3]=.5+t*.4; dCol[i*3+1]=.55+t*.15; dCol[i*3+2]=.65+(1-t)*.35;
  }
  const dustGeo=new THREE.BufferGeometry();
  dustGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
  dustGeo.setAttribute('color',new THREE.BufferAttribute(dCol,3));
  const dustPts=new THREE.Points(dustGeo,
    new THREE.PointsMaterial({size:1.2,vertexColors:true,transparent:true,opacity:.28,depthWrite:false})
  );
  scene.add(dustPts);

  const raycaster=new THREE.Raycaster();
  const mouse=new THREE.Vector2();
  const byMesh=new WeakMap();
  let planets3={};

  function _mkPlanet(planet,ri){
    const col=_healthCol(planet.health,planet.bodyType);
    const radius=3+((planet.magnitude||3)/5)*6;
    const mesh=new THREE.Mesh(
      new THREE.SphereGeometry(radius,24,24),
      new THREE.MeshPhongMaterial({
        color:col.base,emissive:col.emissive,emissiveIntensity:.5,shininess:60,specular:0x334466
      })
    );
    // glow sprite — additive blending cria halo colorido sem BackSide sphere
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({
      map:glowTex,color:col.glow,transparent:true,opacity:.65,
      blending:THREE.AdditiveBlending,depthWrite:false
    }));
    sp.scale.set(radius*7,radius*7,1);
    mesh.add(sp);
    if(planet.bodyType==='supernova'){
      mesh.add(new THREE.Mesh(
        new THREE.SphereGeometry(radius*2.8,12,12),
        new THREE.MeshBasicMaterial({color:0xff4400,transparent:true,opacity:.14,side:THREE.BackSide,depthWrite:false})
      ));
      mesh.material.emissiveIntensity=.9;
    }
    const r=RINGS[ri].rf*THREE_SCALE;
    const a=savedAngles[planet.name]||0;
    mesh.position.set(r*Math.cos(a),0,r*Math.sin(a));
    scene.add(mesh);
    planets3[planet.name]={mesh,ri,health:planet.health,bodyType:planet.bodyType};
    byMesh.set(mesh,planet);
  }

  function buildPlanets(planets){
    Object.values(planets3).forEach(({mesh})=>scene.remove(mesh));
    planets3={};
    const station=planets.find(p=>p.bodyType==='station');
    const orbital=planets.filter(p=>p.bodyType!=='station');
    const sorted=[...orbital].sort((a,b)=>a.daysSincePush-b.daysSincePush);
    const si=sorted.findIndex(p=>p.bodyType==='satellite');
    if(si>0){const[s]=sorted.splice(si,1);sorted.unshift(s);}
    const t=sorted.length;
    const sp=[Math.round(t*.18),Math.round(t*.26),Math.round(t*.30)];
    sp.push(t-sp[0]-sp[1]-sp[2]);
    let pi=0;
    const ringCounts=[0,0,0,0];
    for(let ri=0;ri<RINGS.length;ri++)
      for(let j=0;j<sp[ri]&&pi<sorted.length;j++,pi++){
        const p=sorted[pi];
        // distribuição inicial uniforme por anel — evita empilhamento no ângulo 0
        if(savedAngles[p.name]===undefined)
          savedAngles[p.name]=(ringCounts[ri]/sp[ri])*Math.PI*2+ri*0.37;
        ringCounts[ri]++;
        _mkPlanet(p,ri);
      }
    if(station){
      const col=_healthCol(station.health,'station');
      const r=3+((station.magnitude||3)/5)*4;
      const mesh=new THREE.Mesh(
        new THREE.CylinderGeometry(r,r,r*.6,6),
        new THREE.MeshPhongMaterial({color:col.base,emissive:col.emissive,emissiveIntensity:.4,shininess:80})
      );
      mesh.position.set(0,10,0);
      scene.add(mesh);
      planets3[station.name]={mesh,ri:-1};
      byMesh.set(mesh,station);
    }
  }

  function step(){
    const t=performance.now()*.001;
    dustPts.rotation.y+=.00018;
    // sol respira — emissive oscila suavemente
    sunMat.emissiveIntensity=1.3+.35*Math.sin(t*.6);
    sunSprite.material.opacity=.45+.15*Math.sin(t*.6);
    Object.entries(planets3).forEach(([name,{mesh,ri,health,bodyType}])=>{
      mesh.rotation.y+=.004;
      if(ri<0){mesh.rotation.y+=.005;return;}
      // planetas doentes pulsam
      if(health&&health!=='healthy'){
        const ph=(name.charCodeAt(0)%7)*.9;
        const pulse=.45+.55*Math.abs(Math.sin(t*2.8+ph));
        mesh.material.emissiveIntensity=pulse;
        const sp=mesh.children[0]; if(sp&&sp.isMesh===false) sp.material.opacity=.4+.6*pulse;
      }
      if(bodyType==='supernova'){
        const ph=(name.charCodeAt(1)||5)*.7;
        mesh.material.emissiveIntensity=.7+.5*Math.abs(Math.sin(t*3.5+ph));
      }
      savedAngles[name]=(savedAngles[name]||0)+RINGS[ri].spd*.003;
      const r=RINGS[ri].rf*THREE_SCALE, a=savedAngles[name];
      mesh.position.set(r*Math.cos(a),0,r*Math.sin(a));
    });
    renderer.render(scene,camera);
  }

  function getMeshes(){return Object.values(planets3).map(p=>p.mesh);}

  canvas.addEventListener('click',e=>{
    const rc=canvas.getBoundingClientRect();
    mouse.x=((e.clientX-rc.left)/rc.width)*2-1;
    mouse.y=-((e.clientY-rc.top)/rc.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(getMeshes());
    if(hits.length){const d=byMesh.get(hits[0].object);if(d)openPanel(d,null);}
  });
  canvas.addEventListener('mousemove',e=>{
    const rc=canvas.getBoundingClientRect();
    mouse.x=((e.clientX-rc.left)/rc.width)*2-1;
    mouse.y=-((e.clientY-rc.top)/rc.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    canvas.style.cursor=raycaster.intersectObjects(getMeshes()).length?'pointer':'default';
  });

  _thr={renderer,scene,camera,buildPlanets,step};
}

function buildGalactic(planets){
  _initThree();
  if(!_thr) return;
  _thr.buildPlanets(planets);
  const tc=document.getElementById('three-canvas');
  tc.style.display='block'; tc.style.pointerEvents='auto';
}

function stepGalactic(){if(_thr) _thr.step();}

function resizeGalactic(){
  if(!_thr) return;
  _thr.camera.aspect=innerWidth/innerHeight;
  _thr.camera.updateProjectionMatrix();
  _thr.renderer.setSize(innerWidth,innerHeight);
}

function switchView(v){
  if(v===currentView) return;
  currentView=v;
  document.querySelectorAll('.vb').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  document.getElementById('wrap').classList.toggle('galactic',v==='galactic');
  const tc=document.getElementById('three-canvas');
  if(v==='galactic'){
    tc.style.display='block'; tc.style.pointerEvents='auto';
    if(allPlanets.length) buildGalactic(allPlanets);
  } else {
    tc.style.display='none'; tc.style.pointerEvents='none';
    if(allPlanets.length){buildOrbit(allPlanets);resizeOrbit();}
  }
}

const panel=document.getElementById('panel');
const panelBody=document.getElementById('panel-body');
let panelOpen=false, selectedWrapper=null;

const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const safeHex=c=>/^#[0-9a-fA-F]{3,8}$/.test(c)?c:'#8b949e';

function openPanel(p,wrapper){
  hideTip();
  if(selectedWrapper)selectedWrapper.classList.remove('selected');
  selectedWrapper=wrapper; if(wrapper) wrapper.classList.add('selected');

  const mag='★'.repeat(p.magnitude||1)+'☆'.repeat(5-(p.magnitude||1));
  const diskMB=p.diskKB>1024?(p.diskKB/1024).toFixed(1)+' MB':(p.diskKB||0)+' KB';
  const ghUrl=`https://github.com/paulinett1508-dev/${esc(p.name)}`;

  const langRow=p.lang
    ?`<div class="pn-row"><span class="pn-label">linguagem</span><span class="pn-val"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${safeHex(p.lang.color)};margin-right:5px;vertical-align:middle"></span>${esc(p.lang.name)}</span></div>`
    :'';
  const contrRow=p.contributors>0
    ?`<div class="pn-row"><span class="pn-label">contribuidores</span><span class="pn-val">${p.contributors|0}</span></div>`
    :'';
  let prRow='';
  if(p.lastPR){
    const pr=p.lastPR;
    const prTitle=esc(pr.title.length>30?pr.title.slice(0,28)+'…':pr.title);
    const prDate=new Date(pr.mergedAt||pr.createdAt);
    const prAgo=Math.floor((Date.now()-prDate.getTime())/86400000);
    const prDateStr=prAgo===0?'hoje':prAgo===1?'ontem':`${prAgo}d atrás`;
    // stateColor is hardcoded, not from API — safe to interpolate directly
    const stateColor=pr.state==='MERGED'?'#a371f7':pr.state==='OPEN'?'#3fb950':'#f85149';
    const stateLabel=pr.state==='MERGED'?'merged':pr.state==='OPEN'?'aberto':'fechado';
    prRow=`<div class="pn-row" style="align-items:flex-start"><span class="pn-label">último PR</span><span class="pn-val" style="max-width:155px;text-align:right"><span style="color:${stateColor};font-size:10px;margin-right:3px">●${stateLabel}</span><br><span style="font-size:10.5px;opacity:.8">${prTitle}</span><br><span style="font-size:10px;color:#4a5888">${prDateStr}</span></span></div>`;
  }

  const btLabel=bodyTypeLabel[p.bodyType]||'';
  panelBody.innerHTML=`
    <div class="pn-info">
      <div class="pn-name">${esc(p.name)}</div>
      ${btLabel?`<div style="font-size:10px;color:#6870a8;margin-bottom:4px;letter-spacing:.5px">${btLabel}</div>`:''}
      <div class="pn-health ${p.health}">${healthLabel[p.health]||p.health}</div>
      <hr class="pn-sep">
      <div class="pn-row"><span class="pn-label">magnitude</span><span class="pn-val pn-stars">${mag}</span></div>
      <div class="pn-row"><span class="pn-label">commits</span><span class="pn-val">${(p.commits||0).toLocaleString()}</span></div>
      <div class="pn-row"><span class="pn-label">tamanho</span><span class="pn-val">${diskMB}</span></div>
      ${langRow}${contrRow}
      <hr class="pn-sep">
      <div class="pn-row"><span class="pn-label">último push</span><span class="pn-val">${daysStr(p.daysSincePush)}</span></div>
      <div class="pn-row"><span class="pn-label">issues abertas</span><span class="pn-val">${p.issues}</span></div>
      ${p.ci?`<div class="pn-row"><span class="pn-label">CI</span><span class="pn-val">${p.ci}</span></div>`:''}
      ${prRow}
      <a class="pn-gh" href="${ghUrl}" target="_blank" rel="noopener">↗ abrir no GitHub</a>
    </div>`;

  panel.classList.add('open');
  document.body.classList.add('panel-open');
  panelOpen=true;

  // start planet animation after transition completes
  setTimeout(()=>{
    if(currentView==='orbital') resizeOrbit();
    startPlanetAnim(p);
  },340);
}

function closePanel(){
  stopPlanetAnim();
  document.getElementById('planet-wrap').innerHTML='';
  panel.classList.remove('open');
  document.body.classList.remove('panel-open');
  panelOpen=false;
  if(selectedWrapper){selectedWrapper.classList.remove('selected');selectedWrapper=null;}
  setTimeout(()=>{ if(currentView==='orbital') resizeOrbit(); },340);
}

document.getElementById('panel-close').addEventListener('click',closePanel);

// ═══════════════════════════════════════════════════════
// LIVE EVENTS — polling + visual effects
// ═══════════════════════════════════════════════════════
const seenEvents = new Set();

const FX_DUR = { push:1600, pr:2800, pr_merged:2800, issue:2400, create:1800 };

function triggerEffect(repoName, type){
  const wrapper = univ.querySelector(`[data-planet="${repoName}"]`);
  if(!wrapper) return;
  const dot = wrapper.querySelector('.pd');
  if(!dot) return;

  const cls = type==='pr_merged'?'fx-pr': type==='issue'?'fx-issue': type==='create'?'fx-create':'fx-push';
  // remove any existing effect first
  dot.classList.remove('fx-push','fx-pr','fx-issue','fx-create');
  // force reflow so animation restarts
  void dot.offsetWidth;
  dot.classList.add(cls);
  const dur = FX_DUR[type] || 1600;
  setTimeout(()=>dot.classList.remove(cls), dur);
}

async function pollEvents(){
  try{
    const res = await fetch('/api/events');
    if(!res.ok) return;
    const {events=[]} = await res.json();
    for(const ev of events){
      if(seenEvents.has(ev.id)) continue;
      seenEvents.add(ev.id);
      triggerEffect(ev.repo, ev.type);
    }
    // cap set size
    if(seenEvents.size > 300){
      [...seenEvents].slice(0, seenEvents.size-300).forEach(id=>seenEvents.delete(id));
    }
  }catch(_){}
}

// MAIN

function loop(){
  if(currentView==='orbital') stepPlanets(); else stepGalactic();
  drawBg();
  requestAnimationFrame(loop);
}

async function loadPlanets(){
  try{
    const res=await fetch('/api/planets');
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    document.getElementById('loader').style.display='none';
    if(data.updatedAt){
      const d=new Date(data.updatedAt);
      document.getElementById('upd').textContent=
        `atualizado ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
    }
    return data.planets||[];
  }catch(e){
    document.getElementById('loader').textContent='erro — '+e.message;
    return[];
  }
}

async function main(){
  initStars();
  cometCd=200+Math.floor(Math.random()*300);
  meteorCd=80+Math.floor(Math.random()*120);
  resizeOrbit();
  const planets=await loadPlanets();
  if(planets.length){allPlanets=planets;updateStats(planets);buildOrbit(planets);}
  loop();

  document.querySelectorAll('.vb').forEach(b=>
    b.addEventListener('click',()=>switchView(b.dataset.view))
  );

  setInterval(async()=>{
    const fresh=await loadPlanets();
    if(fresh.length){
      allPlanets=fresh; updateStats(fresh);
      if(currentView==='orbital') buildOrbit(fresh); else buildGalactic(fresh);
    }
  },5*60*1000);

  setTimeout(()=>{
    pollEvents();
    setInterval(pollEvents,8_000);
  },10_000);
}

window.addEventListener('resize',()=>{
  initStars();
  if(currentView==='orbital') resizeOrbit(); else resizeGalactic();
});
main();
