<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>theuniverse · observatório</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030308;color:#c8ceff;font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}

/* header */
#hdr{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid rgba(100,120,200,.15);background:rgba(3,3,8,.88);backdrop-filter:blur(12px);flex-shrink:0;gap:12px}
#hdr h1{font-size:14px;letter-spacing:3px;color:#fff;text-transform:uppercase;white-space:nowrap}
#hdr h1 em{color:#7b8cff;font-style:normal}
#stats{display:flex;gap:14px;font-size:11px;color:#5a6090;flex-wrap:wrap;justify-content:flex-end}
.sv{font-weight:bold;color:#c8ceff}
.sg{color:#00ff88}.sy{color:#ffcc00}.sr{color:#ff4466}
.stat-hide-sm{display:inline}

/* orbit area */
#wrap{flex:1;position:relative;z-index:5;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:padding .32s cubic-bezier(.22,1,.36,1)}
#univ{position:relative}
.ring{position:absolute;border:1px solid rgba(80,100,180,.13);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* sun */
#sun{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:50%;background:radial-gradient(circle,#fff8cc 0%,#ffd700 40%,#ff8c00 75%,transparent 100%);box-shadow:0 0 20px #ffd700,0 0 50px rgba(255,200,0,.35),0 0 100px rgba(255,140,0,.15);animation:sun-pulse 5s ease-in-out infinite;z-index:30;cursor:default}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 20px #ffd700,0 0 50px rgba(255,200,0,.35),0 0 100px rgba(255,140,0,.15)}50%{box-shadow:0 0 30px #ffd700,0 0 70px rgba(255,200,0,.5),0 0 130px rgba(255,140,0,.22)}}

/* planets */
.pw{position:absolute;top:0;left:0;transform:translate(calc(var(--px) - 50%), calc(var(--py) - 50%));will-change:transform;z-index:20;cursor:pointer}
.pd{position:relative;overflow:visible;border-radius:50%;transition:transform .15s;width:calc(var(--mag,9) * 1px);height:calc(var(--mag,9) * 1px)}
.pw:hover .pd,.pw:active .pd{transform:scale(2.2)}
.pd.healthy{background:#00ff88;box-shadow:0 0 6px #00ff88,0 0 14px rgba(0,255,136,.4)}
.pd.healthy-v1{background:#00ddaa;box-shadow:0 0 6px #00ddaa,0 0 15px rgba(0,221,170,.42)}
.pd.healthy-v2{background:#44ff66;box-shadow:0 0 6px #44ff66,0 0 15px rgba(68,255,102,.42)}
.pd.healthy-v3{background:#00cc88;box-shadow:0 0 6px #00cc88,0 0 15px rgba(0,204,136,.42)}
.pd.healthy-v4{background:#77ff44;box-shadow:0 0 7px #77ff44,0 0 16px rgba(119,255,68,.42)}
.pd.healthy-v5{background:#22ee99;box-shadow:0 0 6px #22ee99,0 0 15px rgba(34,238,153,.42)}
.pd.warning{background:#ffcc00;box-shadow:0 0 6px #ffcc00,0 0 14px rgba(255,204,0,.4)}
.pd.warning-v1{background:#ffaa00;box-shadow:0 0 6px #ffaa00,0 0 15px rgba(255,170,0,.42)}
.pd.warning-v2{background:#f0dd00;box-shadow:0 0 6px #f0dd00,0 0 15px rgba(240,221,0,.42)}
.pd.warning-v3{background:#ffbb33;box-shadow:0 0 6px #ffbb33,0 0 15px rgba(255,187,51,.42)}
.pd.warning-v4{background:#ff9922;box-shadow:0 0 6px #ff9922,0 0 16px rgba(255,153,34,.42)}
.pd.warning-v5{background:#eecc11;box-shadow:0 0 6px #eecc11,0 0 15px rgba(238,204,17,.42)}
.pd.alert{background:#ff4466;box-shadow:0 0 8px #ff4466,0 0 22px rgba(255,68,102,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v1{background:#ff2244;box-shadow:0 0 8px #ff2244,0 0 22px rgba(255,34,68,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v2{background:#ff6633;box-shadow:0 0 8px #ff6633,0 0 22px rgba(255,102,51,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v3{background:#ff3355;box-shadow:0 0 8px #ff3355,0 0 22px rgba(255,51,85,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v4{background:#ee1144;box-shadow:0 0 9px #ee1144,0 0 24px rgba(238,17,68,.65);animation:pulse-r 1.1s ease-in-out infinite}
.pd.alert-v5{background:#ff5522;box-shadow:0 0 8px #ff5522,0 0 22px rgba(255,85,34,.6);animation:pulse-r 1.1s ease-in-out infinite}
.pd.dormant{background:#1e1e38;box-shadow:0 0 3px #3a3a60}
.pw.selected .pd{transform:scale(1.8);outline:2px solid rgba(255,255,255,.9);outline-offset:3px;box-shadow:0 0 0 5px rgba(255,255,255,.15),0 0 20px rgba(255,255,255,.3) !important;animation:none !important}
@keyframes pulse-r{0%,100%{box-shadow:0 0 8px #ff4466,0 0 22px rgba(255,68,102,.6)}50%{box-shadow:0 0 16px #ff4466,0 0 44px rgba(255,68,102,.85),0 0 66px rgba(255,68,102,.3)}}

/* ── live event effects ── */

/* push: flash branco + anel shockwave */
.pd.fx-push{animation:fx-push-dot 1.6s ease-out forwards !important}
@keyframes fx-push-dot{
  0%  {transform:scale(1);filter:brightness(1)}
  12% {transform:scale(3);filter:brightness(7)}
  100%{transform:scale(1);filter:brightness(1)}
}
.pd.fx-push::after{
  content:'';position:absolute;
  top:0;left:0;width:100%;height:100%;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.9);
  animation:fx-ripple 1.6s ease-out forwards;
  pointer-events:none;
}
@keyframes fx-ripple{
  0%  {transform:scale(1);opacity:1}
  100%{transform:scale(9);opacity:0}
}

/* PR: pulso laranja caloroso */
.pd.fx-pr{animation:fx-pr 2.8s ease-in-out forwards !important}
@keyframes fx-pr{
  0%,100%{filter:brightness(1)}
  30%,70%{filter:brightness(4) sepia(.6) hue-rotate(-10deg);transform:scale(2.4)}
}
.pd.fx-pr::after{
  content:'';position:absolute;
  top:0;left:0;width:100%;height:100%;
  border-radius:50%;
  border:2px solid rgba(255,180,0,.85);
  animation:fx-pr-ring 2.8s ease-in-out forwards;
  pointer-events:none;
}
@keyframes fx-pr-ring{
  0%,100%{transform:scale(1);opacity:0}
  20%    {transform:scale(1);opacity:1}
  80%    {transform:scale(5);opacity:0}
}

/* Issue: pisco âmbar suave */
.pd.fx-issue{animation:fx-issue 2.4s ease-in-out forwards !important}
@keyframes fx-issue{
  0%,100%{filter:brightness(1)}
  25%,75%{filter:brightness(3) sepia(1);transform:scale(1.9)}
}

/* Create/tag: esverdeado */
.pd.fx-create{animation:fx-create 1.8s ease-out forwards !important}
@keyframes fx-create{
  0%  {filter:brightness(1)}
  20% {filter:brightness(5) hue-rotate(120deg);transform:scale(2.5)}
  100%{filter:brightness(1)}
}

/* tooltip — hover mínimo */
#tip{position:fixed;z-index:100;display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 14px;pointer-events:none;opacity:0;transition:opacity .15s;backdrop-filter:blur(8px);white-space:nowrap}
#tip.on{opacity:1}
.tt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tt-name{font-size:12px;color:rgba(255,255,255,.85);letter-spacing:.15em}
.tt-cluster{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:.3em;text-transform:uppercase;margin-top:2px}

/* side card */
#panel{position:fixed;top:50%;right:0;width:320px;max-height:80vh;overflow-y:auto;z-index:200;background:rgba(4,4,12,.92);border-left:1px solid rgba(255,255,255,.08);border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);border-radius:12px 0 0 12px;backdrop-filter:blur(16px);box-shadow:-8px 0 40px rgba(0,0,0,.8);transform:translateY(-50%) translateX(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
#panel.open{transform:translateY(-50%) translateX(0)}
body.panel-open #wrap{padding-right:0}
#panel-handle{display:none}
#panel::-webkit-scrollbar{width:3px}
#panel::-webkit-scrollbar-track{background:transparent}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
#panel-close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(255,255,255,.22);font-size:14px;cursor:pointer;line-height:1;transition:color .2s;z-index:5;padding:2px 6px}
#panel-close:hover{color:rgba(255,255,255,.7)}
#panel-body{padding:28px 24px 28px}
/* hide canvas in galactic mode */
#planet-wrap{display:none}

/* card content */
.card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.card-dot{width:14px;height:14px;border-radius:50%;margin-top:4px;flex-shrink:0}
.card-name{font-family:Georgia,serif;font-size:18px;color:rgba(255,255,255,.88);letter-spacing:.03em;line-height:1.2;word-break:break-all}
.card-cluster{font-size:9px;letter-spacing:.35em;color:rgba(255,255,255,.22);text-transform:uppercase;margin-top:4px}
.card-status{display:flex;align-items:center;gap:7px;margin-bottom:16px}
.status-dot{width:6px;height:6px;border-radius:50%;animation:pulse-status 2s ease-in-out infinite}
@keyframes pulse-status{0%,100%{opacity:1}50%{opacity:.4}}
.card-divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}
.card-section-title{font-size:9px;letter-spacing:.4em;color:rgba(255,255,255,.2);text-transform:uppercase;margin-bottom:12px}
.card-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.card-row:last-child{border:none}
.card-key{font-size:10px;letter-spacing:.15em;color:rgba(255,255,255,.25);text-transform:uppercase}
.card-val{font-size:12px;color:rgba(255,200,80,.8);letter-spacing:.05em;text-align:right;max-width:190px;word-break:break-word}
.card-gh-btn{display:block;margin-top:20px;padding:10px 0;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:rgba(255,255,255,.5);font-size:11px;letter-spacing:.2em;text-decoration:none;transition:background .2s,color .2s;font-family:'Courier New',monospace}
.card-gh-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85)}

/* bottom bar */
#bar{position:relative;z-index:10;background:rgba(3,3,8,.88);border-top:1px solid rgba(100,120,200,.12);padding:7px 20px;font-size:11px;backdrop-filter:blur(12px);display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:30px}
.ai{color:#ff4466;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
#upd{margin-left:auto;color:#3a4060;white-space:nowrap}
#loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#3a4060;font-size:12px;z-index:50;letter-spacing:2px}

/* ── responsive ── */
@media(max-width:600px){
  .stat-hide-sm{display:none}
  #hdr h1{font-size:12px;letter-spacing:2px}
  #stats{gap:10px;font-size:10px}
  #panel{width:100%;max-height:65vh;top:auto;bottom:0;right:0;border-left:none;border-top:1px solid rgba(255,255,255,.08);border-radius:14px 14px 0 0;transform:translateY(100%)}
  #panel.open{transform:translateY(0)}
  #panel-handle{display:block;width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:10px auto 0;flex-shrink:0}
  #panel-body{padding:20px 18px 28px}
  #tip{display:none}
  #bar{font-size:10px;padding:5px 14px}
}
@media(max-width:380px){
  #hdr h1{letter-spacing:1px;font-size:11px}
  #stats{display:none}
}

/* ── view toggle ── */
#view-btns{display:flex;gap:5px;flex-shrink:0}
.vb{background:none;border:1px solid rgba(100,120,200,.18);border-radius:4px;color:#3a4070;font-size:11px;cursor:pointer;padding:3px 9px;transition:all .15s;letter-spacing:.5px;font-family:inherit;white-space:nowrap}
.vb.active{border-color:rgba(100,120,200,.5);color:#c8ceff;background:rgba(100,120,200,.07)}
.vb:hover:not(.active){color:#7880a8;border-color:rgba(100,120,200,.3)}

/* ── vista galáctica: Three.js (The Observable Universe) ── */
#gal-canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:8;pointer-events:none}
#wrap.galactic #univ{display:none}
#wrap.galactic #loader{display:none}
#wrap.galactic #gal-canvas{display:block;pointer-events:auto}

/* ── galactic UI controls (bottom-left, visível só na vista galáctica) ── */
#gal-ui{position:fixed;bottom:28px;left:36px;z-index:30;display:none;flex-direction:column;gap:10px;pointer-events:none;isolation:isolate}
#gal-ui.visible{display:flex}
.gc-row{display:flex;align-items:center;gap:10px;pointer-events:auto}
.gc-lbl{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.2);text-transform:uppercase;width:72px;flex-shrink:0}
.gc-val{font-size:10px;color:rgba(255,200,80,.6);width:32px;text-align:right;flex-shrink:0}
.gc-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.gc-btn:hover{background:rgba(255,255,255,.12)}
.gc-tog{font-size:9px;letter-spacing:.2em;min-width:30px}
input.gc-range{-webkit-appearance:none;width:110px;height:1px;background:rgba(255,255,255,.12);outline:none;cursor:pointer;flex-shrink:0}
input.gc-range::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:rgba(255,200,80,.75);cursor:pointer}

/* ── body types ── */
.body-station .pd{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);border-radius:0;background:linear-gradient(135deg,#9ab2d0 0%,#4a6888 55%,#2a3e58 100%);box-shadow:0 0 8px rgba(130,170,220,.7),0 0 24px rgba(70,110,200,.35);animation:station-spin 28s linear infinite}
@keyframes station-spin{to{rotate:1turn}}
.pw.body-station:hover .pd,.pw.body-station.selected .pd{transform:scale(2.2)}
.body-satellite .pd{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);border-radius:0;background:linear-gradient(135deg,#b8c8d8 0%,#6888a0 100%);box-shadow:0 0 5px rgba(160,185,210,.5)}
.body-supernova .pd{background:radial-gradient(circle,#fff8e0 0%,#ffa000 40%,#ff3300 80%,#660000 100%)!important;box-shadow:0 0 12px #ff8800,0 0 36px rgba(255,100,0,.7),0 0 70px rgba(255,40,0,.3)!important;animation:supernova-throb .65s ease-in-out infinite!important}
@keyframes supernova-throb{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.6);filter:brightness(1.8)}}
.body-nebula .pd{background:radial-gradient(circle,rgba(180,100,255,.55) 0%,rgba(100,60,200,.35) 45%,rgba(40,20,80,.18) 100%);box-shadow:0 0 14px rgba(160,80,255,.6),0 0 36px rgba(120,60,220,.3);animation:nebula-pulse 5s ease-in-out infinite;border-radius:50%;filter:blur(.5px)}
@keyframes nebula-pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.18);opacity:1}}
.body-observatory .pd{background:#c8d8f8!important;box-shadow:0 0 6px rgba(180,200,255,.7),0 0 18px rgba(140,170,255,.35)!important}
.body-observatory .pd::before{content:'';position:absolute;width:calc(100% + 14px);height:calc(100% + 14px);border:1px dashed rgba(180,210,255,.45);border-radius:50%;top:-7px;left:-7px;pointer-events:none}

/* ── simulated clock (top-right, galactic only) ── */
#gal-clock{position:fixed;top:56px;right:32px;text-align:right;z-index:15;display:none;pointer-events:none}
#gal-clock.visible{display:block}
body.panel-open #gal-legend{display:none!important}
#gal-clock .lbl{font-size:9px;letter-spacing:.4em;color:rgba(255,255,255,.18);text-transform:uppercase}
#gal-clock .yr{font-family:Georgia,serif;font-size:22px;color:rgba(255,255,255,.55);margin-top:3px;letter-spacing:.04em}
#gal-clock .dt{font-size:9px;letter-spacing:.22em;color:rgba(255,255,255,.2);margin-top:2px}

/* ── legend (center-right, galactic only) ── */
#gal-legend{position:fixed;top:50%;right:28px;transform:translateY(-50%);z-index:15;display:none;flex-direction:column;gap:5px;max-height:60vh;overflow-y:auto;pointer-events:auto}
#gal-legend.visible{display:flex}
#gal-legend::-webkit-scrollbar{width:2px}
#gal-legend::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.leg-row{display:flex;align-items:center;justify-content:flex-end;gap:7px;cursor:pointer;padding:2px 5px;border-radius:3px;transition:background .15s}
.leg-row:hover{background:rgba(255,255,255,.07)}
.leg-row.active .leg-lbl{color:rgba(255,200,80,.9)}
.leg-row.leg-special{padding-left:12px}
.leg-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:8px;letter-spacing:.18em;color:rgba(255,255,255,.2);text-transform:uppercase;transition:color .2s;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── bloom slider in gal-ui ── */
.gc-row-bloom{display:flex;align-items:center;gap:10px;pointer-events:auto}
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="gal-canvas"></canvas>

<div id="hdr">
  <h1>the<em>universe</em> &middot; observatório <span style="font-size:.55em;opacity:.45;font-weight:400;letter-spacing:.08em">v3</span></h1>
  <div id="view-btns">
    <button class="vb active" data-view="galactic" title="Via Láctea">━ galáctica</button>
  </div>
  <div id="stats">
    <span>planetas&nbsp;<span class="sv" id="st">—</span></span>
    <span class="stat-hide-sm">saudáveis&nbsp;<span class="sv sg" id="sh">—</span></span>
    <span class="stat-hide-sm">atenção&nbsp;<span class="sv sy" id="sw">—</span></span>
    <span>☠&nbsp;<span class="sv sr" id="sa">—</span></span>
  </div>
</div>

<div id="wrap">
  <div id="loader">carregando universo&hellip;</div>
  <div id="univ"></div>
</div>

<div id="panel">
  <div id="panel-handle"></div>
  <button id="panel-close" title="fechar (ESC)">✕</button>
  <div id="planet-wrap"></div>
  <div id="panel-body"></div>
</div>

<div id="tip"></div>

<div id="gal-ui">
  <div class="gc-row">
    <button class="gc-btn" id="gc-pause" title="Pausar / Retomar (Espaço)">⏸</button>
    <span class="gc-lbl">pausa</span>
  </div>
  <div class="gc-row">
    <span class="gc-lbl">velocidade</span>
    <input class="gc-range" type="range" id="gc-speed" min="0" max="100" step="0.5" value="30">
    <span class="gc-val" id="gc-speed-val">1×</span>
  </div>
  <div class="gc-row">
    <button class="gc-btn gc-tog active" id="gc-atm" title="Mostrar/ocultar atmosferas (A)">🌫 atmosfera</button>
  </div>
  <div class="gc-row">
    <span class="gc-lbl">órbitas</span>
    <button class="gc-btn gc-tog" id="gc-orbits" title="Mostrar/ocultar órbitas (O)">ON</button>
  </div>
  <div class="gc-row">
    <span class="gc-lbl">bloom</span>
    <input class="gc-range" type="range" id="gc-bloom" min="0" max="3" step=".05" value="1.2">
    <span class="gc-val" id="gc-bloom-val">1.2</span>
  </div>
  <div class="gc-row">
    <span class="gc-lbl">atmosfera</span>
    <input class="gc-range" type="range" id="gc-atm-sl" min="0" max="2" step=".05" value="1">
    <span class="gc-val" id="gc-atm-val">1.0</span>
  </div>
  <div class="gc-row">
    <span class="gc-lbl">luz solar</span>
    <input class="gc-range" type="range" id="gc-sunlight" min="0" max="5" step=".1" value="3">
    <span class="gc-val" id="gc-sunlight-val">3.0</span>
  </div>
</div>

<div id="gal-clock">
  <div class="lbl">Ano simulado</div>
  <div class="yr" id="gc-year">2024.000</div>
  <div class="dt" id="gc-date">01 Jan 2024</div>
</div>

<div id="gal-legend"></div>

<div id="bar">
  <span id="alerts">&#10024; Órbita estável</span>
  <span id="upd"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha512-dLxUelApnYxpLt6K2iomGngnHO83iUvZytA3YjDUCjT0HDOHKXnVYdf3hU4JjM8uEhxf9nD1/ey98U3t2vZ0qQ==" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════
// CANVAS — starfield + comets + meteors

const cnv=document.getElementById('stars'), ctx=cnv.getContext('2d');
let stars=[], comets=[], meteors=[];
let cometCd=0, meteorCd=0;
let dustParticles=[];

function initStars(){
  cnv.width=innerWidth; cnv.height=innerHeight;
  stars=Array.from({length:220},()=>({
    x:Math.random()*cnv.width, y:Math.random()*cnv.height,
    r:Math.random()*1.3, a:Math.random(), da:(Math.random()-.5)*.004,
  }));
  // poeiras cósmicas — visíveis só na vista galáctica
  dustParticles=Array.from({length:340},()=>({
    x:Math.random()*cnv.width, y:Math.random()*cnv.height,
    r:0.5+Math.random()*2.2,
    a:0.04+Math.random()*0.18,
    // deriva lenta para simular o giro galáctico
    vx:(Math.random()-.5)*0.06, vy:(Math.random()-.5)*0.04,
    // cor: mistura entre branco frio, âmbar e lilás
    hue:[210,35,270,45,200][Math.floor(Math.random()*5)],
    sat:[20,40,30,50,10][Math.floor(Math.random()*5)],
  }));
}

// ── Comet ──
function mkComet(){
  // spawn from top/left edges, travel diagonally
  const fromTop=Math.random()>.4;
  const x=fromTop ? Math.random()*cnv.width*1.2-cnv.width*.1 : -20;
  const y=fromTop ? -20 : Math.random()*cnv.height*.6;
  const angle=Math.PI*.18+Math.random()*Math.PI*.22; // ~10–50° from horizontal
  const spd=1.2+Math.random()*2;
  return{
    x, y,
    vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
    len: 120+Math.random()*180,
    w: 1.2+Math.random()*.8,
    life:0, maxLife: Math.max(cnv.width,cnv.height)*1.8/spd,
    warm: Math.random()>.5,  // warm=gold, cool=blue-white
  };
}

function drawComet(c){
  c.life++;
  const prog=c.life/c.maxLife;
  const alpha=Math.sin(prog*Math.PI)*0.75;
  if(alpha<.02) return false;
  const tx=c.x-c.vx*(c.len/Math.hypot(c.vx,c.vy));
  const ty=c.y-c.vy*(c.len/Math.hypot(c.vx,c.vy));
  const g=ctx.createLinearGradient(tx,ty,c.x,c.y);
  const col=c.warm?'255,230,160':'200,215,255';
  g.addColorStop(0,`rgba(${col},0)`);
  g.addColorStop(.7,`rgba(${col},${alpha*.35})`);
  g.addColorStop(1,`rgba(${col},${alpha})`);
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(c.x,c.y);
  ctx.strokeStyle=g; ctx.lineWidth=c.w; ctx.stroke();
  // nucleus glow
  const ng=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.w*4);
  ng.addColorStop(0,`rgba(${col},${alpha})`);
  ng.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ng;
  ctx.beginPath(); ctx.arc(c.x,c.y,c.w*4,0,Math.PI*2); ctx.fill();
  c.x+=c.vx; c.y+=c.vy;
  return c.x<cnv.width+50 && c.y<cnv.height+50 && c.life<c.maxLife;
}

// ── Meteor / bolide ──
function mkMeteor(){
  const x=Math.random()*cnv.width*1.3-cnv.width*.15;
  const y=Math.random()*cnv.height*.55;
  const spd=10+Math.random()*14;
  const angle=Math.PI*.08+Math.random()*Math.PI*.18;
  return{
    x, y,
    vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
    life:0, maxLife: 12+Math.random()*16,
  };
}

function drawMeteor(m){
  m.life++;
  const prog=m.life/m.maxLife;
  const alpha=Math.sin(prog*Math.PI);
  if(alpha<.02) return false;
  const steps=5;
  const tx=m.x-m.vx*steps; const ty=m.y-m.vy*steps;
  const g=ctx.createLinearGradient(tx,ty,m.x,m.y);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(.6,`rgba(220,230,255,${alpha*.5})`);
  g.addColorStop(1,`rgba(255,255,255,${alpha})`);
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(m.x,m.y);
  ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
  m.x+=m.vx; m.y+=m.vy;
  return m.life<m.maxLife;
}

function drawBg(){
  ctx.clearRect(0,0,cnv.width,cnv.height);
  // em galactic com Three.js ativo, só o starfield de fundo (sem overlay canvas)

  // spawn
  if(--cometCd<=0){ comets.push(mkComet()); cometCd=420+Math.random()*480; }
  if(--meteorCd<=0){
    const n=1+(Math.random()>.65?1:0)+(Math.random()>.85?1:0);
    for(let i=0;i<n;i++) meteors.push(mkMeteor());
    meteorCd=200+Math.random()*320;
  }
  comets=comets.filter(c=>drawComet(c));
  meteors=meteors.filter(m=>drawMeteor(m));

  // stars
  for(const s of stars){
    s.a=Math.max(.08,Math.min(1,s.a+s.da));
    if(s.a<=.08||s.a>=1)s.da*=-1;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,255,${s.a})`; ctx.fill();
  }
}

  },
};

function hashStr(s){
  let h=0;
  for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return Math.abs(h);
}

function hex2rgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

let planetRaf=null, planetRot=0;

function stopPlanetAnim(){
  if(planetRaf){cancelAnimationFrame(planetRaf);planetRaf=null;}
}

function drawObservatory(pc,W,H,planet,rot){
  pc.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.30;
  // atmosphere glow — pale blue-white
  const ag=pc.createRadialGradient(cx,cy,R*.7,cx,cy,R*1.7);
  ag.addColorStop(0,'rgba(140,170,255,.22)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  pc.fillStyle=ag; pc.beginPath(); pc.arc(cx,cy,R*1.7,0,Math.PI*2); pc.fill();
  // sphere
  pc.save(); pc.beginPath(); pc.arc(cx,cy,R,0,Math.PI*2); pc.clip();
  const base=pc.createRadialGradient(cx-R*.35,cy-R*.38,R*.05,cx+R*.2,cy+R*.25,R*1.1);
  base.addColorStop(0,'#d8e8ff'); base.addColorStop(.45,'#8090c8'); base.addColorStop(1,'#202848');
  pc.fillStyle=base; pc.fillRect(0,0,W,H);
  // craters
  const craters=[[-.3,-.25,R*.12],[.2,.35,R*.08],[-.1,.4,R*.06],[.4,-.1,R*.10],[-.45,.15,R*.07]];
  for(const[dx,dy,cr]of craters){
    const cx2=cx+dx*R,cy2=cy+dy*R;
    const cg=pc.createRadialGradient(cx2-cr*.2,cy2-cr*.2,0,cx2,cy2,cr);
    cg.addColorStop(0,'rgba(180,195,240,.15)'); cg.addColorStop(.6,'rgba(80,90,140,.18)'); cg.addColorStop(1,'rgba(40,50,100,.1)');
    pc.fillStyle=cg; pc.beginPath(); pc.ellipse(cx2,cy2,cr,cr*.55,rot*.3,0,Math.PI*2); pc.fill();
  }
  // specular
  const spec=pc.createRadialGradient(cx-R*.38,cy-R*.4,0,cx-R*.38,cy-R*.4,R*.85);
  spec.addColorStop(0,'rgba(255,255,255,.28)'); spec.addColorStop(.5,'rgba(255,255,255,.07)'); spec.addColorStop(1,'rgba(255,255,255,0)');
  pc.fillStyle=spec; pc.fillRect(0,0,W,H);
  // terminator shadow
  const sh=pc.createRadialGradient(cx+R*.3,cy+R*.35,R*.3,cx+R*.2,cy+R*.2,R*1.05);
  sh.addColorStop(0,'rgba(0,0,0,0)'); sh.addColorStop(.6,'rgba(0,0,0,.2)'); sh.addColorStop(1,'rgba(0,0,0,.7)');
  pc.fillStyle=sh; pc.fillRect(0,0,W,H);
  pc.restore();
  // orbiting moon
  const moonR=R*.12, moonDist=R*1.55;
  const mx=cx+moonDist*Math.cos(rot*2.8), my=cy+moonDist*Math.sin(rot*2.8);
  // dashed orbit ring
  pc.save(); pc.setLineDash([3,5]);
  pc.beginPath(); pc.arc(cx,cy,moonDist,0,Math.PI*2);
  pc.strokeStyle='rgba(160,190,255,.25)'; pc.lineWidth=1; pc.stroke();
  pc.restore();
  // moon sphere
  const mg=pc.createRadialGradient(mx-moonR*.3,my-moonR*.3,0,mx,my,moonR);
  mg.addColorStop(0,'#e8eeff'); mg.addColorStop(.6,'#a0b0d0'); mg.addColorStop(1,'#505878');
  pc.beginPath(); pc.arc(mx,my,moonR,0,Math.PI*2); pc.fillStyle=mg; pc.fill();
  // label
  const [gr,gg,gb]=hex2rgb('#6090e0');
  pc.font='10px Courier New'; pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right'; pc.fillText(planet.name,W-10,H-8);
}

function drawStation(pc,W,H,planet,rot){
  pc.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.34;
  // glow
  const ag=pc.createRadialGradient(cx,cy,R*.4,cx,cy,R*1.9);
  ag.addColorStop(0,'rgba(100,150,220,.18)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  pc.fillStyle=ag; pc.beginPath(); pc.arc(cx,cy,R*1.9,0,Math.PI*2); pc.fill();
  pc.save(); pc.translate(cx,cy); pc.rotate(rot*.28);
  // outer ring
  pc.beginPath(); pc.arc(0,0,R*1.18,0,Math.PI*2);
  pc.strokeStyle='rgba(100,150,220,.22)'; pc.lineWidth=1.5; pc.stroke();
  // hex body
  pc.beginPath();
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?pc.moveTo(R*Math.cos(a),R*Math.sin(a)):pc.lineTo(R*Math.cos(a),R*Math.sin(a));}
  pc.closePath();
  const g=pc.createLinearGradient(-R,-R,R,R);
  g.addColorStop(0,'#9ab2d0'); g.addColorStop(.5,'#4a6888'); g.addColorStop(1,'#2a3e58');
  pc.fillStyle=g; pc.fill();
  pc.strokeStyle='rgba(150,190,240,.5)'; pc.lineWidth=1.5; pc.stroke();
  // spokes + mid ring
  pc.strokeStyle='rgba(150,190,240,.18)'; pc.lineWidth=1;
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;pc.beginPath();pc.moveTo(0,0);pc.lineTo(R*Math.cos(a),R*Math.sin(a));pc.stroke();}
  pc.beginPath(); pc.arc(0,0,R*.55,0,Math.PI*2);
  pc.strokeStyle='rgba(150,190,240,.3)'; pc.lineWidth=1; pc.stroke();
  // core hub
  const hub=pc.createRadialGradient(-R*.08,-R*.08,0,0,0,R*.28);
  hub.addColorStop(0,'#7090b8'); hub.addColorStop(1,'#1e3050');
  pc.beginPath(); pc.arc(0,0,R*.28,0,Math.PI*2); pc.fillStyle=hub; pc.fill();
  pc.strokeStyle='rgba(150,190,240,.5)'; pc.lineWidth=1; pc.stroke();
  pc.restore();
  const [gr,gg,gb]=hex2rgb('#6080a8');
  pc.font='10px Courier New'; pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right'; pc.fillText(planet.name,W-10,H-8);
}

function drawSatellite(pc,W,H,planet,rot){
  pc.clearRect(0,0,W,H);
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.13;
  // faint glow
  const ag=pc.createRadialGradient(cx,cy,R,cx,cy,R*4);
  ag.addColorStop(0,'rgba(120,160,200,.12)'); ag.addColorStop(1,'rgba(0,0,0,0)');
  pc.fillStyle=ag; pc.beginPath(); pc.arc(cx,cy,R*4,0,Math.PI*2); pc.fill();
  pc.save(); pc.translate(cx,cy); pc.rotate(rot*.45);
  // solar panels
  const pw=R*3.2,ph=R*.9;
  [[-1],[1]].forEach(([side])=>{
    const ox=side*(R+2);
    const panelG=pc.createLinearGradient(ox,-ph/2,ox,ph/2);
    panelG.addColorStop(0,'rgba(50,70,120,.9)'); panelG.addColorStop(1,'rgba(30,50,90,.9)');
    pc.fillStyle=panelG; pc.fillRect(ox+(side<0?-pw:0),-ph/2,pw,ph);
    pc.strokeStyle='rgba(80,120,200,.4)'; pc.lineWidth=.6;
    pc.strokeRect(ox+(side<0?-pw:0),-ph/2,pw,ph);
    for(let i=1;i<4;i++){
      const x=ox+(side<0?-pw:0)+i*pw/4;
      pc.beginPath(); pc.moveTo(x,-ph/2); pc.lineTo(x,ph/2);
      pc.strokeStyle='rgba(80,120,180,.25)'; pc.stroke();
    }
    // panel connector
    pc.beginPath(); pc.moveTo(side*R,0); pc.lineTo(ox,0);
    pc.strokeStyle='rgba(150,180,220,.4)'; pc.lineWidth=1; pc.stroke();
  });
  // body (diamond)
  pc.beginPath(); pc.moveTo(0,-R*2); pc.lineTo(R,0); pc.lineTo(0,R*2); pc.lineTo(-R,0); pc.closePath();
  const g=pc.createLinearGradient(-R,-R*2,R,R*2);
  g.addColorStop(0,'#c0ccdc'); g.addColorStop(.5,'#708090'); g.addColorStop(1,'#3a4858');
  pc.fillStyle=g; pc.fill();
  pc.strokeStyle='rgba(160,190,220,.6)'; pc.lineWidth=1; pc.stroke();
  // antenna
  pc.beginPath(); pc.moveTo(0,-R*2); pc.lineTo(0,-R*3.2);
  pc.strokeStyle='rgba(180,200,220,.5)'; pc.lineWidth=1; pc.stroke();
  pc.beginPath(); pc.arc(0,-R*3.2,R*.25,0,Math.PI*2);
  pc.fillStyle='rgba(180,210,240,.7)'; pc.fill();
  pc.restore();
  const [gr,gg,gb]=hex2rgb('#7090a8');
  pc.font='10px Courier New'; pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right'; pc.fillText(planet.name,W-10,H-8);
}

function startPlanetAnim(planet){
  stopPlanetAnim();
  const wrap=document.getElementById('planet-wrap');
  wrap.innerHTML='';
  const W=wrap.clientWidth||260;
  const H=Math.round(W*.72);
  const cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  wrap.appendChild(cv);
  const pc=cv.getContext('2d');
  const seed=hashStr(planet.name);
  const bt=planet.bodyType||'planet';
  const hasRings=(planet.magnitude>=4)&&(seed%3===0)&&bt==='planet';
  planetRot=0;
  function frame(){
    if(bt==='station') drawStation(pc,W,H,planet,planetRot);
    else if(bt==='satellite') drawSatellite(pc,W,H,planet,planetRot);
    else if(bt==='observatory') drawObservatory(pc,W,H,planet,planetRot);
    else drawPlanet(pc,W,H,planet,seed,planetRot,hasRings);
    planetRot+=0.006;
    planetRaf=requestAnimationFrame(frame);
  }
  frame();
}

function drawPlanet(pc,W,H,planet,seed,rot,hasRings){
  pc.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2;
  const R=Math.min(W,H)*(hasRings?.30:.38);
  const bt=planet.bodyType||'planet';
  const thKey=bt==='station'?'station':bt==='satellite'?'satellite':bt==='supernova'?'supernova':bt==='nebula'?'nebula':bt==='observatory'?'observatory':planet.health;
  const th=THEMES[thKey]||THEMES.dormant;

  // ── atmosphere glow ──
  if(th.atm){
    const ag=pc.createRadialGradient(cx,cy,R*.8,cx,cy,R*1.55);
    ag.addColorStop(0,th.atm);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    pc.fillStyle=ag;
    pc.beginPath(); pc.arc(cx,cy,R*1.55,0,Math.PI*2); pc.fill();
  }

  // ── rings back half (drawn before planet) ──
  if(hasRings) _drawRings(pc,cx,cy,R,th,true);

  // ── planet sphere (clipped) ──
  pc.save();
  pc.beginPath(); pc.arc(cx,cy,R,0,Math.PI*2); pc.clip();

  // base gradient (3D lighting: bright top-left, dark bottom-right)
  const [br,bg,bb]=hex2rgb(th.base[2]);
  const [mr,mg,mb]=hex2rgb(th.base[1]);
  const [dr,dg,db]=hex2rgb(th.base[0]);
  const base=pc.createRadialGradient(cx-R*.35,cy-R*.38,R*.05,cx+R*.2,cy+R*.25,R*1.1);
  base.addColorStop(0,`rgb(${br},${bg},${bb})`);
  base.addColorStop(.45,`rgb(${mr},${mg},${mb})`);
  base.addColorStop(1,`rgb(${dr},${dg},${db})`);
  pc.fillStyle=base; pc.fillRect(0,0,W,H);

  // surface bands (latitude strips, shift with rotation)
  const nBands=th.bands.length;
  for(let i=0;i<nBands;i++){
    const t=(i+.5)/nBands;
    const bandY=cy-R+t*R*2;
    const chord=Math.sqrt(Math.max(0,R*R-(bandY-cy)*(bandY-cy)));
    const xShift=Math.sin(rot*1.2+i*0.8+(seed%100)*.063)*chord*.3;
    const bh=R*.22+Math.sin(seed*0.07+i)*R*.06;
    const op=.12+.13*Math.abs(Math.sin(seed*.11+i*1.3));
    const [cr,cg,cb]=hex2rgb(th.bands[i]);
    pc.globalAlpha=op;
    pc.fillStyle=`rgb(${cr},${cg},${cb})`;
    pc.beginPath();
    pc.ellipse(cx+xShift,bandY,chord*.88,bh,0,0,Math.PI*2);
    pc.fill();
  }
  pc.globalAlpha=1;

  // specular highlight (top-left)
  const spec=pc.createRadialGradient(cx-R*.38,cy-R*.4,0,cx-R*.38,cy-R*.4,R*.85);
  spec.addColorStop(0,'rgba(255,255,255,.22)');
  spec.addColorStop(.5,'rgba(255,255,255,.06)');
  spec.addColorStop(1,'rgba(255,255,255,0)');
  pc.fillStyle=spec; pc.fillRect(0,0,W,H);

  // terminator shadow (bottom-right)
  const shadow=pc.createRadialGradient(cx+R*.3,cy+R*.35,R*.3,cx+R*.2,cy+R*.2,R*1.05);
  shadow.addColorStop(0,'rgba(0,0,0,0)');
  shadow.addColorStop(.6,'rgba(0,0,0,.25)');
  shadow.addColorStop(1,'rgba(0,0,0,.75)');
  pc.fillStyle=shadow; pc.fillRect(0,0,W,H);

  pc.restore();

  // ── rings front half (drawn after planet) ──
  if(hasRings) _drawRings(pc,cx,cy,R,th,false);

  // subtle vignette label
  const [gr,gg,gb]=hex2rgb(th.glow);
  pc.font='10px Courier New';
  pc.fillStyle=`rgba(${gr},${gg},${gb},.55)`;
  pc.textAlign='right';
  pc.fillText(planet.name,W-10,H-8);
}

function _drawRings(pc,cx,cy,R,th,backHalf){
  const rin=R*1.28, rout=R*2.05, ry=R*.14;
  const [gr,gg,gb]=hex2rgb(th.base[1]);
  const startA=backHalf?Math.PI:0;
  const endA=backHalf?Math.PI*2:Math.PI;
  for(let r=rout;r>=rin;r-=3){
    const t=(r-rin)/(rout-rin);
    const alpha=.5*Math.sin(t*Math.PI);
    if(alpha<.04) continue;
    pc.beginPath();
    pc.ellipse(cx,cy,r,ry,0,startA,endA);
    pc.strokeStyle=`rgba(${gr},${gg},${gb},${alpha*.8})`;
    pc.lineWidth=2;
    pc.stroke();
  }
}

const RINGS=[{rf:.21,spd:.26},{rf:.33,spd:.165},{rf:.455,spd:.105},{rf:.575,spd:.067}];

function isMobile(){return innerWidth<=600}
function getUnivSz(){
  const w=document.getElementById('wrap');
  return Math.min(w.clientWidth,w.clientHeight)*.92;
}

function _mkWrapper(planet){
  const wrapper=document.createElement('div');
  const bt=planet.bodyType||'planet';
  wrapper.className='pw'+(bt!=='planet'?' body-'+bt:'');
  wrapper.dataset.planet=planet.name;
  const dot=document.createElement('div');
  const baseHealth=bt==='supernova'?'alert':bt==='observatory'?'healthy':planet.health;
  const vIdx=hashStr(planet.name)%6;
  const vClass=vIdx>0&&baseHealth!=='dormant'?` ${baseHealth}-v${vIdx}`:'';
  dot.className=`pd ${baseHealth}${vClass}`;
  const px=8+(((planet.magnitude||3)-1)/4)*18; // 8–26px range
  dot.style.setProperty('--mag',px.toFixed(1));
  wrapper.appendChild(dot);
  wrapper.addEventListener('mouseenter',e=>{if(!panelOpen&&!isMobile())showTip(e,planet)});
  wrapper.addEventListener('mousemove',e=>{if(!panelOpen&&!isMobile())moveTip(e)});
  wrapper.addEventListener('mouseleave',hideTip);
  wrapper.addEventListener('click',()=>openPanel(planet,wrapper));
  return wrapper;
}

function buildOrbit(planets){
  univ.innerHTML=''; nodes=[]; angles=[]; stationWrapper=null;

  // station is fixed near the sun — removed from orbital rings
  const station=planets.find(p=>p.bodyType==='station');
  const orbital=planets.filter(p=>p.bodyType!=='station');

  const sorted=[...orbital].sort((a,b)=>a.daysSincePush-b.daysSincePush);
  // force satellite to innermost ring (ring 0)
  const satIdx=sorted.findIndex(p=>p.bodyType==='satellite');
  if(satIdx>0){const[s]=sorted.splice(satIdx,1);sorted.unshift(s);}

  const total=sorted.length;
  const splits=[Math.round(total*.18),Math.round(total*.26),Math.round(total*.30)];
  splits.push(total-splits[0]-splits[1]-splits[2]);

  for(let ri=0;ri<RINGS.length;ri++){
    const el=document.createElement('div');
    el.className='ring';
    const d=RINGS[ri].rf*2*univSz;
    el.style.width=d+'px'; el.style.height=d+'px';
    univ.appendChild(el);
  }

  let pi=0;
  for(let ri=0;ri<RINGS.length;ri++){
    const count=splits[ri];
    for(let j=0;j<count&&pi<sorted.length;j++,pi++){
      const planet=sorted[pi];
      if(savedAngles[planet.name]===undefined)
        savedAngles[planet.name]=(j/count)*Math.PI*2;

      const wrapper=_mkWrapper(planet);
      wrapper.style.setProperty('--px','0px');
      wrapper.style.setProperty('--py','0px');

      univ.appendChild(wrapper);
      nodes.push({el:wrapper,ri,name:planet.name});
      angles.push(savedAngles[planet.name]);
    }
  }

  // station: fixed hexagonal body near sun
  if(station){
    const sw=_mkWrapper(station);
    sw.style.setProperty('--px','0px');
    sw.style.setProperty('--py','0px');
    univ.appendChild(sw);
    stationWrapper=sw;
    _placeStation();
  }

  const sun=document.createElement('div');
  sun.id='sun'; univ.appendChild(sun);
}

function stepPlanets(){
  const cx=univSz/2, cy=univSz/2;
  for(let i=0;i<nodes.length;i++){
    const {el,ri,name}=nodes[i];
    angles[i]+=RINGS[ri].spd*0.0045;
    savedAngles[name]=angles[i];
    const r=RINGS[ri].rf*univSz;
    const x=cx+r*Math.cos(angles[i]);
    const y=cy+r*Math.sin(angles[i]);
    el.style.setProperty('--px',x+'px');
    el.style.setProperty('--py',y+'px');
  }
}

function _placeStation(){
  if(!stationWrapper||!univSz) return;
  const dist=univSz*.095, angle=Math.PI*.28;
  stationWrapper.style.setProperty('--px',(univSz/2+dist*Math.cos(angle))+'px');
  stationWrapper.style.setProperty('--py',(univSz/2+dist*Math.sin(angle))+'px');
}

function resizeOrbit(){
  univSz=getUnivSz();
  univ.style.width=univSz+'px'; univ.style.height=univSz+'px';
  _placeStation();
}

// GLSL atmosphere shader
const _ATM_VERT=`varying vec3 vNormal;varying vec3 vViewDir;void main(){vNormal=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.0);vViewDir=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`;
const _ATM_FRAG=`uniform vec3 uColor;uniform float uIntensity;varying vec3 vNormal;varying vec3 vViewDir;void main(){float rim=1.0-abs(dot(vNormal,vViewDir));rim=pow(rim,2.8);gl_FragColor=vec4(uColor,rim*uIntensity);}`;

// DNA única por planeta — 100% derivada do nome, zero influência de saúde/commits
function _galPlanetDNA(p){
  let h=0;for(let i=0;i<p.name.length;i++)h=(Math.imul(31,h)+p.name.charCodeAt(i))|0;
  const hue=((h>>>0)%360);
  // persona tem prioridade total sobre qualquer derivação
  const persona=_GAL_PERSONA[p.name];
  function hslHex(hh,s,l){s/=100;l/=100;const a=s*Math.min(l,1-l);const f=n=>{const k=(n+hh/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c)|0;};return(f(0)<<16)|(f(8)<<8)|f(4);}
  if(persona){
    const col=hslHex(persona.hue,persona.sat,persona.lit);
    const tilt=.04+(((h>>>0)%100)/100)*.4;
    return{col,surface:persona.surface,tilt,hue:persona.hue,seed:(h>>>0)%99999};
  }
  // superfície derivada puramente do hash do nome (5 tipos uniformes)
  const surfaces=['giant','banded','continental','rocky','smooth'];
  const surface=surfaces[((h>>>0)%5)];
  const satMap={giant:55,continental:62,banded:50,rocky:28,smooth:52};
  const litMap={giant:48,continental:50,banded:44,rocky:33,smooth:52};
  const col=hslHex(hue,satMap[surface]||50,litMap[surface]||48);
  const tilt=.05+(((h>>>0)%100)/100)*.55;
  const seed=(h>>>0)%99999;
  return{col,surface,tilt,hue,seed};
}

function _galBaseCol(p){
  const bt=p.bodyType;
  if(bt==='station')     return 0x5080b0;
  if(bt==='satellite')   return 0x8090a8;
  if(bt==='supernova')   return 0xff4400;
  if(bt==='nebula')      return 0xa050e0;
  if(bt==='observatory') return 0x6090e0;
  return _galPlanetDNA(p).col;
}
function _galAtmCol(p){
  if(_GAL_PERSONA[p.name]?.noAtm) return null;
  const bt=p.bodyType;
  if(bt==='satellite')   return null;
  if(bt==='supernova')   return '#ff8800';

  if(bt==='station')     return '#6090e0';

  if(h==='alert')        return '#ff4466';

  // saudável: atmosfera na cor única do planeta
  const {hue}=_galPlanetDNA(p);

}
function _galRadius(p){
  // persona pode definir tamanho absoluto
  if(_GAL_PERSONA[p.name]?.radius) return _GAL_PERSONA[p.name].radius;

  if(bt==='supernova')   return 2.2;
  if(bt==='nebula')      return 2.0;
  if(bt==='observatory') return 1.4;
  return 0.7+((p.magnitude||3)/5)*1.4;
}

// seeded RNG helper
function _rng(seed){let s=seed|0;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff};}

function _galCanvasTex(sz,fn){const cv=document.createElement('canvas');cv.width=cv.height=sz;fn(cv.getContext('2d'),sz);return new THREE.CanvasTexture(cv);}

function _galGlow(r,hex,alpha){
  const sz=256,cv=document.createElement('canvas');cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  const rr=(hex>>16)&0xff,gg=(hex>>8)&0xff,bb=hex&0xff;
  const g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
  g.addColorStop(0,`rgba(${rr},${gg},${bb},${alpha})`);
  g.addColorStop(.25,`rgba(${rr},${gg},${bb},${alpha*.6})`);
  g.addColorStop(.6,`rgba(${rr},${gg},${bb},${alpha*.15})`);
  g.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));

}

function _galInitScene(planets){
  const canvas=document.getElementById('gal-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ReinhardToneMapping;
  renderer.toneMappingExposure=1.0;
  renderer.outputEncoding=THREE.sRGBEncoding;

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.05,12000);
  const clock=new THREE.Clock();
  const _localY=new THREE.Vector3(0,1,0); // reusado a cada frame

  // ── ESTADO DA CÂMERA ──────────────────────────────────────────────
  const cam={
    theta:.3, phi:1.1, radius:260, radiusGoal:260,
    target:new THREE.Vector3(), targetGoal:new THREE.Vector3(),
  };
  let focusMesh=null;
  let focusGroup=null;

  function updateCamera(){
    if(focusMesh){const _wp=new THREE.Vector3();focusMesh.getWorldPosition(_wp);cam.targetGoal.copy(_wp);}
    else{cam.targetGoal.set(0,0,0);}
    cam.target.lerp(cam.targetGoal,.06);
    cam.radius+=(cam.radiusGoal-cam.radius)*.06;
    camera.position.set(
      cam.target.x+cam.radius*Math.sin(cam.phi)*Math.sin(cam.theta),
      cam.target.y+cam.radius*Math.cos(cam.phi),
      cam.target.z+cam.radius*Math.sin(cam.phi)*Math.cos(cam.theta)
    );
    camera.lookAt(cam.target);
  }

  // ── DRAG DA CÂMERA ──────────────────────────────────────────────
  let _drag=false,_pm={x:0,y:0},_mdp={x:0,y:0};
  canvas.addEventListener('mousedown',e=>{if(e.target!==canvas)return;_drag=true;_pm={x:e.clientX,y:e.clientY};_mdp={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>_drag=false);
  window.addEventListener('mousemove',e=>{
    if(!_drag)return;
    cam.theta-=(e.clientX-_pm.x)*.007;
    cam.phi=Math.max(.08,Math.min(Math.PI*.47,cam.phi+(e.clientY-_pm.y)*.005));
    _pm={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener('wheel',e=>{
    if(e.target!==canvas)return;e.preventDefault();
    const sens=cam.radius*.001+.05;
    let minR=8;
    if(focusMesh){const ud=focusMesh.userData;if(ud.isBH)minR=25;else if(ud._isMoon)minR=Math.max(2,(ud.radius??0.5)*3);else minR=Math.max(5,(ud.radius??1)*2);}
    cam.radiusGoal=Math.max(minR,Math.min(800,cam.radiusGoal+e.deltaY*sens));
  },{passive:false});
  canvas.addEventListener('touchstart',e=>{if(e.target!==canvas)return;_drag=true;_pm={x:e.touches[0].clientX,y:e.touches[0].clientY};_mdp={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(!_drag)return;
    cam.theta-=(e.touches[0].clientX-_pm.x)*.007;
    cam.phi=Math.max(.08,Math.min(Math.PI*.47,cam.phi+(e.touches[0].clientY-_pm.y)*.005));
    _pm={x:e.touches[0].clientX,y:e.touches[0].clientY};
  },{passive:true});
  canvas.addEventListener('touchend',()=>_drag=false);

  // ── CLICK (raycast) ──────────────────────────────────────────────
  const _clickMouse=new THREE.Vector2();
  canvas.addEventListener('click',e=>{
    if(Math.abs(e.clientX-_mdp.x)>5||Math.abs(e.clientY-_mdp.y)>5)return; // foi drag
    _clickMouse.x=(e.clientX/innerWidth)*2-1;
    _clickMouse.y=-(e.clientY/innerHeight)*2+1;
    raycaster.setFromCamera(_clickMouse,camera);
    const hits=raycaster.intersectObjects(actualMeshes,true);
    if(hits.length>0){
      let obj=hits[0].object;
      while(obj&&!obj.userData?.name&&!obj.userData?.id)obj=obj.parent;
      if(obj?.userData){
        focusMesh=obj;
        const ud=obj.userData;
        if(ud.isBH){cam.radiusGoal=120;}
        else{cam.radiusGoal=(_galRadius(ud)||1)*8+20;}
        const pd=ud.name?planets.find(p=>p.name===ud.name):null;
        if(pd||ud.name){
          openPanel(pd||ud,null);
          _legendEl?.querySelectorAll('.leg-row').forEach(r=>r.classList.toggle('active',r.dataset.name===(ud.name||ud.id)));
        }
      }
    } else {
      focusMesh=null;cam.radiusGoal=260;
      closePanel();
      _legendEl?.querySelectorAll('.leg-row').forEach(r=>r.classList.remove('active'));
    }
  });

  // ── TECLADO ──────────────────────────────────────────────────────
  window.addEventListener('keydown',e=>{
    if(currentView!=='galactic')return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key==='Escape'){focusMesh=null;cam.radiusGoal=260;cam.targetGoal.set(0,0,0);closePanel();_legendEl?.querySelectorAll('.leg-row').forEach(r=>r.classList.remove('active'));}
    else if(e.key==='f'||e.key==='F'){if(focusMesh){const r=focusMesh.userData.radius??1;cam.radiusGoal=r*5+10;}}
    else if(e.key===' '){e.preventDefault();_galState.paused=!_galState.paused;}
    else if(e.key==='ArrowRight'){_selectNext(1);}
    else if(e.key==='ArrowLeft'){_selectNext(-1);}
  });
  function _selectNext(dir){
    if(!actualMeshes.length)return;
    const cur=focusMesh?actualMeshes.indexOf(focusMesh):-1;
    const nxt=(cur+dir+actualMeshes.length)%actualMeshes.length;
    focusMesh=actualMeshes[nxt];
    const ud=focusMesh.userData;
    if(ud.isBH){cam.radiusGoal=120;}else{cam.radiusGoal=(_galRadius(ud)||1)*8+20;}
  }

  // ── stars ──
  (()=>{
    const r=_rng(42),N=12000;
    const pos=new Float32Array(N*3),col=new Float32Array(N*3);
    const sp=[[1,.97,.88],[.75,.85,1],[1,.82,.65],[1,1,1],[1,.7,.6],[.9,.9,1]];
    for(let i=0;i<N;i++){
      const d=1400+r()*900,th=r()*Math.PI*2,ph=Math.acos(2*r()-1);
      pos[i*3]=d*Math.sin(ph)*Math.cos(th);pos[i*3+1]=d*Math.sin(ph)*Math.sin(th);pos[i*3+2]=d*Math.cos(ph);
      const c=sp[Math.floor(r()*sp.length)],br=.35+r()*.65;
      col[i*3]=c[0]*br;col[i*3+1]=c[1]*br;col[i*3+2]=c[2]*br;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:1.2,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:.92})));
  })();

  // ── milky way ──
  (()=>{
    const r=_rng(77),N=6000;
    const pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const d=1200+r()*300,bp=(r()-.5)*.22,th=r()*Math.PI*2;
      pos[i*3]=d*Math.cos(bp)*Math.cos(th);pos[i*3+1]=d*Math.sin(bp)*3;pos[i*3+2]=d*Math.cos(bp)*Math.sin(th);
      const t=r();col[i*3]=.35+t*.3;col[i*3+1]=.28+t*.25;col[i*3+2]=.55+t*.45;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.85,sizeAttenuation:false,vertexColors:true,transparent:true,opacity:.18})));
  })();

  // ── nebulae ──
  (()=>{
    const r=_rng(55);
    [{x:900,y:200,z:-400,sc:420,c:0x3a1a6a,o:.12},{x:-700,y:-100,z:300,sc:380,c:0x1a3a6a,o:.10},
     {x:200,y:500,z:-800,sc:500,c:0x6a1a2a,o:.08},{x:-500,y:300,z:-600,sc:350,c:0x1a4a3a,o:.09},
     {x:600,y:-300,z:600,sc:300,c:0x2a1a5a,o:.07}].forEach(n=>{
      const sp=_galGlow(n.sc,n.c,n.o);
      sp.position.set(n.x+(r()-.5)*100,n.y+(r()-.5)*100,n.z+(r()-.5)*100);
      scene.add(sp);
    });
  })();

  // ── cosmic dust ──
  (()=>{
    const r=_rng(13),N=4000,pos=new Float32Array(N*3);
    for(let i=0;i<N;i++){const d=40+r()*500,th=r()*Math.PI*2,ph=(r()-.5)*.5;pos[i*3]=d*Math.cos(ph)*Math.cos(th);pos[i*3+1]=d*Math.sin(ph)*(r()*14-7);pos[i*3+2]=d*Math.cos(ph)*Math.sin(th);}
    const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.55,sizeAttenuation:true,color:0x7766aa,transparent:true,opacity:.07})));
  })();

  // ── sun ──
  const sunTex=_galCanvasTex(512,(ctx,sz)=>{
    const g=ctx.createRadialGradient(sz/2,sz/2,0,sz/2,sz/2,sz/2);
    g.addColorStop(0,'#fff7c0');g.addColorStop(.3,'#ffdd44');g.addColorStop(.7,'#ff9900');g.addColorStop(1,'#cc4400');
    ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
    for(let i=0;i<1200;i++){const x=Math.random()*sz,y=Math.random()*sz,gr=ctx.createRadialGradient(x,y,0,x,y,6+Math.random()*10);gr.addColorStop(0,'rgba(255,255,200,.08)');gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.fillRect(x-16,y-16,32,32);}
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(3.5,64,64),new THREE.MeshBasicMaterial({map:sunTex})));
  [[10,0xff9900,.22],[18,0xff6600,.10],[30,0xff3300,.05],[55,0xff1100,.025],[100,0xaa2200,.010]].forEach(([r,c,o])=>scene.add(_galGlow(r,c,o)));
  const _sunLight=new THREE.PointLight(0xfff5e0,3.0,600);scene.add(_sunLight);
  scene.add(new THREE.AmbientLight(0x223355,1.2));
  const _fillLight=new THREE.DirectionalLight(0x112244,.3);_fillLight.position.set(-200,50,-200);scene.add(_fillLight);

  // ── orbit lines (array para toggle) ──
  const orbitLines=[];
  _GAL_RINGS.forEach(ring=>{
    const pts=[];for(let i=0;i<=128;i++){const a=i/128*Math.PI*2;pts.push(new THREE.Vector3(Math.cos(a)*ring.orbit,0,Math.sin(a)*ring.orbit));}
    const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.055}));
    scene.add(ln);orbitLines.push(ln);
  });

  // ── asteroid belt (between ring 1 and 2) ──
  (()=>{
    const r=_rng(99),N=2500,pos=new Float32Array(N*3),col=new Float32Array(N*3);
    for(let i=0;i<N;i++){const d=60+r()*22+(r()-.5)*8,a=r()*Math.PI*2,y=(r()-.5)*4;pos[i*3]=d*Math.cos(a);pos[i*3+1]=y;pos[i*3+2]=d*Math.sin(a);const br=.3+r()*.4;col[i*3]=br*.9;col[i*3+1]=br*.8;col[i*3+2]=br*.7;}
    const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.6,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.7})));
  })();

  // ── planets ──
  const planetGroups=[];   // orbit groups
  const actualMeshes=[];   // raycaster targets
  const atmospheres=[];    // atmosphere meshes (toggle visibility)
  const moonGroups=[];     // moon local-orbit groups
  const moonPivots=[];     // {pivot, moonMesh, orbitSpeed, selfRotSpeed} — luas binárias
  const parentGroupMap={}; // name → orbitGroup (para parenting de luas)

  // ── helper: constrói mesh de planeta sólido ──
  function _buildPlanetMesh(p,bt,radius){
    const dna=_galPlanetDNA(p);
    const col=new THREE.Color(bt==='supernova'?0xff4400:bt==='observatory'?0x6090e0:dna.col);
    const sr=_rng(dna.seed);
    const tex=_galCanvasTex(256,(ctx,sz)=>{
      const g=ctx.createRadialGradient(sz*.38,sz*.32,0,sz/2,sz/2,sz*.62);
      const lc=col.clone().lerp(new THREE.Color(0xffffff),.28);
      const dc=col.clone().lerp(new THREE.Color(0x000000),.5);
      g.addColorStop(0,`#${lc.getHexString()}`);g.addColorStop(.55,`#${col.getHexString()}`);g.addColorStop(1,`#${dc.getHexString()}`);
      ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
      if(bt==='supernova'){
        for(let k=0;k<9;k++){const x=sr()*sz,y=sr()*sz,rg=ctx.createRadialGradient(x,y,0,x,y,18+sr()*38);rg.addColorStop(0,'rgba(255,255,180,.55)');rg.addColorStop(1,'rgba(255,100,0,0)');ctx.fillStyle=rg;ctx.fillRect(x-60,y-60,120,120);}
      } else if(bt==='observatory'){
        for(let k=0;k<6;k++){const x=sr()*sz,y=sr()*sz,cr=8+sr()*22,cg=ctx.createRadialGradient(x,y,0,x,y,cr);cg.addColorStop(0,'rgba(180,210,255,.18)');cg.addColorStop(1,'rgba(0,0,30,.08)');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(x,y,cr,0,Math.PI*2);ctx.fill();}
      } else if(dna.surface==='giant'||dna.surface==='banded'){
        // bandas horizontais com contraste mais dramático
        const nBands=dna.surface==='giant'?12:9;
        for(let kb=0;kb<nBands;kb++){
          const ypos=(kb/nBands)*sz;
          const darkness=sr()>.45?0xffffff:0x000000;
          const strength=.15+sr()*.35;
          const bc=col.clone().lerp(new THREE.Color(darkness),strength);
          ctx.fillStyle=`rgba(${Math.round(bc.r*255)},${Math.round(bc.g*255)},${Math.round(bc.b*255)},.55)`;
          ctx.fillRect(0,ypos,sz,sz*(.025+sr()*.06));
        }
        // tempestade (spot único para giant — tipo Grande Mancha Vermelha)
        if(dna.surface==='giant'){
          const sx=sz*.35,sy=sz*.55,sw=sz*.22,sh=sz*.10;
          const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,sw);
          sg.addColorStop(0,'rgba(220,120,60,.72)');sg.addColorStop(.5,'rgba(180,80,40,.45)');sg.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=sg;ctx.save();ctx.beginPath();ctx.ellipse(sx,sy,sw,sh,-.2,0,Math.PI*2);ctx.fill();ctx.restore();
        }
      } else if(dna.surface==='continental'){
        for(let k=0;k<6;k++){
          const x=sr()*sz,y=sr()*sz,a=sr()*Math.PI*2,w=18+sr()*48,h2=10+sr()*28;
          const cg=ctx.createRadialGradient(x,y,0,x,y,Math.max(w,h2));
          cg.addColorStop(0,`rgba(${Math.round(lc.r*255)},${Math.round(lc.g*255)},${Math.round(lc.b*255)},.52)`);
          cg.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=cg;ctx.save();ctx.beginPath();ctx.ellipse(x,y,w,h2,a,0,Math.PI*2);ctx.fill();ctx.restore();
        }
      } else if(dna.surface==='rocky'){
        for(let k=0;k<11;k++){
          const x=sr()*sz,y=sr()*sz,cr=3+sr()*14;
          const cg=ctx.createRadialGradient(x,y,0,x,y,cr);
          cg.addColorStop(0,'rgba(0,0,0,.55)');cg.addColorStop(.65,'rgba(0,0,0,.15)');cg.addColorStop(1,'rgba(255,255,255,.04)');
          ctx.fillStyle=cg;ctx.fillRect(x-cr*1.6,y-cr*1.6,cr*3.2,cr*3.2);
        }
      } else {
        for(let k=0;k<4;k++){
          const x=sr()*sz,y=sr()*sz,cg=ctx.createRadialGradient(x,y,0,x,y,25+sr()*55);
          cg.addColorStop(0,'rgba(255,255,255,.09)');cg.addColorStop(1,'rgba(0,0,0,0)');
          ctx.fillStyle=cg;ctx.fillRect(x-85,y-85,170,170);
        }
      }
      // saúde afeta APENAS glow externo, não a textura
    });
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(radius,40,40),new THREE.MeshStandardMaterial({
      map:tex,roughness:.82,metalness:.03,
      emissive:bt==='supernova'?new THREE.Color(0xff4400):new THREE.Color(dna.col).multiplyScalar(.12),
      emissiveIntensity:bt==='supernova'?.5:1.0
    }));
    mesh.rotation.z=dna.tilt;
    const ob=_GAL_OB[dna.surface]||0;
    if(ob>0) mesh.scale.y=1-ob;
    return{mesh,dna};
  }

  // ── helper: constrói e registra um orbit group ──
  function _addOrbitGroup(p,ri,ang,orbit){
    const orbitGroup=new THREE.Group();
    // inclinação orbital: anéis externos mais inclinados + offset por nome
    let nh=0;const nm=p.name||'';for(let i=0;i<nm.length;i++)nh=(Math.imul(31,nh)+nm.charCodeAt(i))|0;
    const tilt=0.04+(ri/20)*0.38+((nh>>>0)%12)/100;
    orbitGroup.userData={...p,_galRi:ri,_galOrbit:orbit,_galOrbitTilt:tilt};
    orbitGroup.position.set(orbit*Math.cos(ang),Math.sin(ang)*orbit*tilt,orbit*Math.sin(ang));
    return orbitGroup;
  }

  function buildPlanetMeshes(pList){
    planetGroups.forEach(g=>scene.remove(g));
    planetGroups.length=0;
    actualMeshes.length=0;
    atmospheres.length=0;
    moonGroups.length=0;
    moonPivots.length=0;
    Object.keys(parentGroupMap).forEach(k=>delete parentGroupMap[k]);

    const station=pList.find(p=>p.bodyType==='station');
    const allOrbital=pList.filter(p=>p.bodyType!=='station');
    const moonList=allOrbital.filter(p=>_GAL_MOON_OF[p.name]);
    const orbital=allOrbital.filter(p=>!_GAL_MOON_OF[p.name]);

    // planetas do par binário (nexus+sbrgestao) e planetas com anel forçado
    const binaryPlanetList=orbital.filter(p=>_GAL_BINARY_PAIR.includes(p.name));
    const forcedPlanets=orbital.filter(p=>_GAL_FORCED_RING[p.name]!==undefined);
    const normalOrbital=orbital.filter(p=>!_GAL_BINARY_PAIR.includes(p.name)&&_GAL_FORCED_RING[p.name]===undefined);

    // distribuir planetas genéricos nos 4 anéis internos (índices 0-3)
    const sorted=[...normalOrbital].sort((a,b)=>a.daysSincePush-b.daysSincePush);
    const satIdx=sorted.findIndex(p=>p.bodyType==='satellite');
    if(satIdx>0){const[s]=sorted.splice(satIdx,1);sorted.unshift(s);}
    const total=sorted.length;
    const splits=[Math.round(total*.18),Math.round(total*.26),Math.round(total*.30)];
    splits.push(Math.max(0,total-splits[0]-splits[1]-splits[2]));

    // ── função interna que constrói um planeta e adiciona à cena ──
    function addPlanet(p,ri,totalInRing,jInRing){
      const bt=p.bodyType||'planet';
      const baseCol=_galBaseCol(p);
      const atmCol=_galAtmCol(p);
      const radius=_galRadius(p);
      if(savedAngles[p.name]===undefined){
        const fi=_GAL_FORCED_RING[p.name];
        savedAngles[p.name]=fi!==undefined?fi*_GAL_GOLDEN:(jInRing/Math.max(1,totalInRing))*Math.PI*2;
      }
      const ang=savedAngles[p.name];
      const orbit=_GAL_RINGS[ri].orbit;
      const orbitGroup=_addOrbitGroup(p,ri,ang,orbit);
      let actualMesh;

      if(bt==='satellite'){
        actualMesh=new THREE.Mesh(new THREE.OctahedronGeometry(radius),new THREE.MeshStandardMaterial({color:baseCol,metalness:.8,roughness:.2}));
        actualMesh.userData=_buildUD(p,ri,orbit);

      } else if(bt==='nebula'){
        const nr=_rng(p.name.charCodeAt(0)||7);
        const N=320,npos=new Float32Array(N*3),ncol=new Float32Array(N*3);
        for(let k=0;k<N;k++){
          const d=radius*(0.5+nr()*1.2),th2=nr()*Math.PI*2,ph2=Math.acos(2*nr()-1);
          npos[k*3]=d*Math.sin(ph2)*Math.cos(th2);npos[k*3+1]=d*Math.sin(ph2)*Math.sin(th2);npos[k*3+2]=d*Math.cos(ph2);
          const br=.4+nr()*.6;ncol[k*3]=.55*br;ncol[k*3+1]=.25*br;ncol[k*3+2]=br;
        }
        const ngeo=new THREE.BufferGeometry();ngeo.setAttribute('position',new THREE.BufferAttribute(npos,3));ngeo.setAttribute('color',new THREE.BufferAttribute(ncol,3));
        orbitGroup.add(new THREE.Points(ngeo,new THREE.PointsMaterial({size:0.55,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.82,depthWrite:false})));
        const nCore=new THREE.Mesh(new THREE.SphereGeometry(radius*.55,16,16),new THREE.MeshBasicMaterial({color:0x9040e0,transparent:true,opacity:.18,depthWrite:false}));
        nCore.userData=_buildUD(p,ri,orbit);
        orbitGroup.add(nCore);
        orbitGroup.add(_galGlow(radius*3.2,0x8030d0,.22));
        orbitGroup.add(_galGlow(radius*5.5,0x5018a0,.08));
        actualMesh=nCore;
        scene.add(orbitGroup);
        planetGroups.push(orbitGroup);
        actualMeshes.push(actualMesh);
        parentGroupMap[p.name]=orbitGroup;
        return;

      } else {
        const {mesh,dna}=_buildPlanetMesh(p,bt,radius);
        actualMesh=mesh;
        actualMesh.userData=_buildUD(p,ri,orbit);
        // anéis de Saturno para planetas com persona.rings=true
        const persona=_GAL_PERSONA[p.name];
        if(persona?.rings){
          const ringTex=_galSaturnRingTex(persona.ringHue||45);
          const ringMesh=new THREE.Mesh(
            new THREE.RingGeometry(radius*1.35,radius*(persona?.ringOuter||2.6),96),
            new THREE.MeshBasicMaterial({map:ringTex,side:THREE.DoubleSide,transparent:true,opacity:persona.ringAlpha||.85,depthWrite:false})
          );
          ringMesh.rotation.x=Math.PI*.5+dna.tilt*.4;
          actualMesh.add(ringMesh);
        }
      }

      orbitGroup.add(actualMesh);
      if(atmCol){const atm=_galMakeAtm(radius,atmCol,1.0);actualMesh.add(atm);atmospheres.push(atm);}
      orbitGroup.add(_galGlow(radius*2.5,baseCol,.12));
      if(p.health==='alert')  orbitGroup.add(_galGlow(radius*3.5,0xff2200,.22));
      if(p.health==='warning')orbitGroup.add(_galGlow(radius*3.0,0xffaa00,.16));

      scene.add(orbitGroup);
      planetGroups.push(orbitGroup);
      actualMeshes.push(actualMesh);
      parentGroupMap[p.name]=orbitGroup;
    }

    // planetas normais distribuídos
    let pi=0;
    for(let ri=0;ri<_GAL_RINGS.length;ri++){
      const count=splits[ri];
      for(let j=0;j<count&&pi<sorted.length;j++,pi++) addPlanet(sorted[pi],ri,count,j);
    }

    // planetas com anel forçado (supercartolamanager)
    forcedPlanets.forEach(p=>{
      const ri=_GAL_FORCED_RING[p.name];
      if(_GAL_FORCED_ANGLE[p.name]!==undefined) savedAngles[p.name]=_GAL_FORCED_ANGLE[p.name];
      addPlanet(p,ri,1,0);
    });

    // ── SISTEMA BINÁRIO: nexus-labsobral + sbrgestao ──
    // Um baricentro (binaryGroup) orbita o sol no anel 1.
    // Os dois planetas ficam dentro dele, separados por 16u.
    // As matrix orbitam o baricentro.
    if(binaryPlanetList.length>0){
      const BINARY_RI=2, BINARY_ORBIT=_GAL_RINGS[BINARY_RI].orbit;
      const BINARY_SEP=12; // distância de cada planeta ao centro do baricentro

      const bAng=savedAngles[_GAL_BINARY_KEY];

      const binaryGroup=new THREE.Group();

      scene.add(binaryGroup);
      planetGroups.push(binaryGroup);
      parentGroupMap[_GAL_BINARY_KEY]=binaryGroup;

      // ordenar para garantir nexus sempre à esquerda, sbrgestao à direita
      const binaryOrder=['nexus-labsobral','sbrgestao'];
      const sortedBinary=[...binaryPlanetList].sort((a,b)=>binaryOrder.indexOf(a.name)-binaryOrder.indexOf(b.name));

      sortedBinary.forEach((p,idx)=>{
        const side=idx===0?-1:1;
        const bt=p.bodyType||'planet';
        const radius=_galRadius(p);
        const atmCol=_galAtmCol(p);
        const baseCol=_galBaseCol(p);
        const{mesh:actualMesh,dna}=_buildPlanetMesh(p,bt,radius);
        actualMesh.userData=_buildUD(p,BINARY_RI,BINARY_ORBIT,{_inBinary:true,_binaryOffset:side*BINARY_SEP});
        actualMesh.position.set(side*BINARY_SEP,0,0);
        // anéis de Saturno

          const ringTex=_galSaturnRingTex(persona.ringHue||45);
          const ringMesh=new THREE.Mesh(
            new THREE.RingGeometry(radius*1.35,radius*(persona?.ringOuter||2.6),96),
            new THREE.MeshBasicMaterial({map:ringTex,side:THREE.DoubleSide,transparent:true,opacity:persona.ringAlpha||.85,depthWrite:false})
          );
          ringMesh.rotation.x=Math.PI*.5+dna.tilt*.4;
          actualMesh.add(ringMesh);
        }
        if(atmCol){const atm=_galMakeAtm(radius,atmCol,1.0);actualMesh.add(atm);atmospheres.push(atm);}
        actualMesh.add(_galGlow(radius*2.5,baseCol,.12));
        if(p.health==='alert')  actualMesh.add(_galGlow(radius*3.5,0xff2200,.22));
        if(p.health==='warning')actualMesh.add(_galGlow(radius*3.0,0xffaa00,.16));
        binaryGroup.add(actualMesh);
        actualMeshes.push(actualMesh);
        parentGroupMap[p.name]=binaryGroup; // para lookup de tooltip

    }

    // luas — parenteadas ao grupo do planeta-pai
    moonList.forEach(moon=>{
      const parentName=_GAL_MOON_OF[moon.name];
      const parentGroup=parentGroupMap[parentName];

      const parentRadius=_galRadius(parentData)||2;

      const mOrbit=mOrbitOverride||(parentRadius*3.2+6);

      const mEmit=moon.name==='the-matrix'?0x1a3a2a:moon.name==='matrix-core'?0x0a1a3a:0x1a2a4a;
      const moonMesh=new THREE.Mesh(

        new THREE.MeshStandardMaterial({color:mCol,roughness:.88,metalness:.05,emissive:new THREE.Color(mEmit),emissiveIntensity:.45})

      moonMesh.userData={...moon,_isMoon:true,cluster:_GAL_CLUSTER_MAP[parentGroup.userData._galRi||2]||'sistema binário',colorHex:'#'+new THREE.Color(mCol).getHexString(),status:_galStatus(moon)};
      const mRing=new THREE.Mesh(
        new THREE.RingGeometry(mRadius*1.1,mRadius*1.25,32),
        new THREE.MeshBasicMaterial({color:mCol,transparent:true,opacity:.45,side:THREE.DoubleSide,depthWrite:false})
      );
      mRing.rotation.x=Math.PI/2;
      moonMesh.add(mRing);
      moonMesh.add(_galGlow(mRadius*5,mCol,.42));
      moonMesh.add(_galGlow(mRadius*9,mCol,.18));

      if(parentName===_GAL_BINARY_KEY){
        // Sistema binário: usar PIVÔ para órbita correta
        const pivot=new THREE.Object3D();
        pivot.setRotationFromEuler(new THREE.Euler(moon.name==='the-matrix'?0.75:-0.55, savedAngles[moon.name+'_m'], 0,'YXZ'));
        moonMesh.position.set(mOrbit,0,0);
        pivot.add(moonMesh);
        parentGroup.add(pivot);
        // Trilha orbital tênue
        const trailPts=[];for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;trailPts.push(new THREE.Vector3(Math.cos(a)*mOrbit,0,Math.sin(a)*mOrbit));}
        const trail=new THREE.Line(new THREE.BufferGeometry().setFromPoints(trailPts),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:.04}));
        trail.rotation.x=moon.name==='the-matrix'?0.22:0.35;
        parentGroup.add(trail);
        const orbitSpd=moon.name==='the-matrix'?1.4:0.9;
        moonPivots.push({pivot,moonMesh,orbitSpeed:orbitSpd,selfRotSpeed:.3,name:moon.name});
        actualMeshes.push(moonMesh);
      } else {
        // Luas normais
        let _finalMesh;

          const _warnMat=new THREE.MeshStandardMaterial({color:0x8a4a00,emissive:new THREE.Color(0xff8800),emissiveIntensity:.8,roughness:.3,metalness:.4});
          const _glassMat=new THREE.MeshStandardMaterial({color:0x88ffcc,emissive:new THREE.Color(0x44ffaa),emissiveIntensity:.4,roughness:0,metalness:.9,transparent:true,opacity:.6});
          // Módulo central hexagonal
          const _lc=new THREE.Mesh(new THREE.CylinderGeometry(.12,.10,.4,6),_labMat);_labGrp.add(_lc);

          const _m1=new THREE.Mesh(new THREE.BoxGeometry(.18,.18,.22),_labMat);_m1.position.set(.2,.05,0);_m1.rotation.y=.3;_labGrp.add(_m1);
          // Módulo exp 2 — laranja, inclinado
          const _m2=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.28,5),_warnMat);_m2.position.set(-.18,-.04,.08);_m2.rotation.z=.2;_labGrp.add(_m2);

          [[.08,.2,.05,.2,0],[-.1,.1,-.08,.15,.4],[.15,0,.1,.12,-.3]].forEach(([x,y,z,h,rz])=>{
            const _a=new THREE.Mesh(new THREE.CylinderGeometry(.005,.005,h,4),new THREE.MeshStandardMaterial({color:0xaaccff,emissive:new THREE.Color(0x4488ff),emissiveIntensity:.5,roughness:.2,metalness:.9}));
            _a.position.set(x,y+h/2,z);_a.rotation.z=rz;_labGrp.add(_a);

          _p2.position.set(.3,-.06,.04);_p2.rotation.z=.15;_labGrp.add(_p2);
          // Luzes de status piscando (verde, laranja, vermelho, ciano)
          [0x00ff00,0xff8800,0xff0000,0x00ffff].forEach((col,i)=>{
            const _sl=new THREE.Mesh(new THREE.SphereGeometry(.018,6,6),new THREE.MeshBasicMaterial({color:col}));
            _sl.position.set(-.08+i*.05,.21,.08);

        } else {
          const _sphMesh=new THREE.Mesh(new THREE.SphereGeometry(mRadius,22,22),new THREE.MeshStandardMaterial({color:mCol,roughness:.88,metalness:.05,emissive:new THREE.Color(mEmit),emissiveIntensity:.45}));
          _sphMesh.userData={...moon,_isMoon:true,colorHex:'#'+new THREE.Color(mCol).getHexString(),cluster:_GAL_CLUSTER_MAP[parentGroup.userData._galRi||0]||'inner'};

        if(moon.name==='luna-base'){
          // luna-base usa pivot para órbita inclinada (evita plano eclíptico)
          const _lbPivot=new THREE.Object3D();
          _lbPivot.setRotationFromEuler(new THREE.Euler(0.65, savedAngles[moon.name+'_m'], 0,'YXZ'));
          _finalMesh.position.set(mOrbit,0,0);
          _lbPivot.add(_finalMesh);
          // trilha orbital tênue
          const _lbPts=[];for(let i=0;i<=64;i++){const a=i/64*Math.PI*2;_lbPts.push(new THREE.Vector3(Math.cos(a)*mOrbit,0,Math.sin(a)*mOrbit));}
          const _lbTrail=new THREE.Line(new THREE.BufferGeometry().setFromPoints(_lbPts),new THREE.LineBasicMaterial({color:0x00ff88,transparent:true,opacity:.05}));
          _lbTrail.rotation.x=0.65;

          parentGroup.add(_lbPivot);
          moonPivots.push({pivot:_lbPivot,moonMesh:_finalMesh,orbitSpeed:.8,selfRotSpeed:.4,name:'luna-base'});
        } else {
          const moonGroup=new THREE.Group();
          moonGroup.userData={...moon,_isMoon:true,_moonOrbit:mOrbit};
          moonGroup.position.set(Math.cos(savedAngles[moon.name+'_m'])*mOrbit,0,Math.sin(savedAngles[moon.name+'_m'])*mOrbit);
          moonGroup.add(_finalMesh);
          moonGroup.add(_galGlow(mRadius*5,mCol,.42));
          moonGroup.add(_galGlow(mRadius*9,mCol,.18));

          moonGroups.push(moonGroup);

        actualMeshes.push(_finalMesh);
      }
    });

    // station
    if(station){
      const stCol=_galBaseCol(station);
      const stGroup=new THREE.Group();
      stGroup.userData={...station,_isStation:true};
      stGroup.position.set(14,0,0);
      const stMesh=new THREE.Mesh(new THREE.CylinderGeometry(1.8,1.8,1.1,6),new THREE.MeshPhongMaterial({color:stCol,emissive:new THREE.Color(stCol).multiplyScalar(.15),shininess:80}));

      stGroup.add(stMesh);
      stGroup.add(_galGlow(4,stCol,.3));
      scene.add(stGroup);
      planetGroups.push(stGroup);
      actualMeshes.push(stMesh);
    }
  }

  const _BH_POS=new THREE.Vector3(480,-60,280);

  function _buildBlackHole(){
    const grp=new THREE.Group();
    grp.position.copy(_BH_POS);
    // horizonte de eventos
    grp.add(new THREE.Mesh(new THREE.SphereGeometry(8,64,64),new THREE.MeshBasicMaterial({color:0x000000})));
    // disco de acreção — helper
    function _makeAccretionDisk(rotX,opacity){
      const geo=new THREE.RingGeometry(10,38,128);
      const pos=geo.attributes.position,uv=geo.attributes.uv;
      for(let i=0;i<pos.count;i++){const x=pos.getX(i),z=pos.getZ(i),d=Math.sqrt(x*x+z*z);uv.setXY(i,(d-10)/28,.5);}
      const cv=document.createElement('canvas');cv.width=512;cv.height=2;
      const cx=cv.getContext('2d'),g=cx.createLinearGradient(0,0,512,0);
      g.addColorStop(0,'rgba(255,255,255,.95)');g.addColorStop(.08,'rgba(255,220,120,.90)');
      g.addColorStop(.2,'rgba(255,140,40,.80)');g.addColorStop(.4,'rgba(220,60,10,.60)');
      g.addColorStop(.65,'rgba(140,20,40,.30)');g.addColorStop(.85,'rgba(60,0,80,.10)');g.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=g;cx.fillRect(0,0,512,2);
      const disk=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),side:THREE.DoubleSide,transparent:true,opacity,depthWrite:false,blending:THREE.AdditiveBlending}));
      disk.rotation.x=rotX;return disk;
    }
    const _bhDisk1=_makeAccretionDisk(Math.PI/2,1.0);
    const _bhDisk2=_makeAccretionDisk(Math.PI/2.8,.4);
    grp.add(_bhDisk1);grp.add(_bhDisk2);
    grp.add(_galGlow(55,0xff6600,.08));grp.add(_galGlow(30,0xffffff,.12));grp.add(_galGlow(14,0xffffff,.22));
    // jatos relativísticos
    function _makeJet(dir){
      const N=200,jpos=new Float32Array(N*3),jcol=new Float32Array(N*3),rj=_rng(dir>0?11:22);
      for(let i=0;i<N;i++){const t=rj(),sp=t*3;jpos[i*3]=(rj()-.5)*sp;jpos[i*3+1]=t*100*dir;jpos[i*3+2]=(rj()-.5)*sp;jcol[i*3]=.5+t*.5;jcol[i*3+1]=.7+t*.3;jcol[i*3+2]=1;}
      const jg=new THREE.BufferGeometry();jg.setAttribute('position',new THREE.BufferAttribute(jpos,3));jg.setAttribute('color',new THREE.BufferAttribute(jcol,3));
      return new THREE.Points(jg,new THREE.PointsMaterial({size:.45,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.35,blending:THREE.AdditiveBlending,depthWrite:false}));
    }
    grp.add(_makeJet(1));grp.add(_makeJet(-1));
    // espiral de gás
    const N2=2000,sp2=new Float32Array(N2*3),sc2=new Float32Array(N2*3),rs=_rng(77);
    for(let i=0;i<N2;i++){const t=rs(),r2=15+(1-t)*180,a2=t*Math.PI*8+rs()*.3;sp2[i*3]=Math.cos(a2)*r2;sp2[i*3+1]=(rs()-.5)*(1-t)*15;sp2[i*3+2]=Math.sin(a2)*r2;sc2[i*3]=.4+t*.6;sc2[i*3+1]=.2+(1-t)*.5;sc2[i*3+2]=.1+(1-t)*.4;}
    const sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.BufferAttribute(sp2,3));sg.setAttribute('color',new THREE.BufferAttribute(sc2,3));
    grp.add(new THREE.Points(sg,new THREE.PointsMaterial({size:.55,sizeAttenuation:true,vertexColors:true,transparent:true,opacity:.5,blending:THREE.AdditiveBlending,depthWrite:false})));
    // userData + hitbox clicável
    grp.userData={id:'black-hole',name:'Buraco Negro',colorHex:'#ff6600',cluster:'zona de decadência',isBH:true,radius:20};
    const bhHit=new THREE.Mesh(new THREE.SphereGeometry(22,16,16),new THREE.MeshBasicMaterial({visible:false,depthWrite:false}));
    bhHit.userData=grp.userData;
    grp.add(bhHit);
    actualMeshes.push(bhHit);
    scene.add(grp);
    return{grp,disk1:_bhDisk1,disk2:_bhDisk2};
  }
