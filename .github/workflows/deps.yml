name: Sentinel · Deps — CVEs nos Planetas

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  deps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: state/deps-state.json
          key: deps-state-${{ github.run_id }}
          restore-keys: deps-state-

      - name: Run Sentinel · Deps
        env:
          GITHUB_TOKEN: ${{ secrets.SENTINEL_GITHUB_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SOL_CHAT_ID: ${{ secrets.SOL_CHAT_ID }}
        run: python scripts/deps.py

      - name: Save state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state/deps-state.json
          key: deps-state-${{ github.run_id }}
