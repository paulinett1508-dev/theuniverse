name: Model Scout

on:
  schedule:
    - cron: "0 8 * * 1"   # toda segunda às 08h UTC
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: state/model-state.json
          key: model-state-${{ github.run_id }}
          restore-keys: model-state-

      - name: Run Model Scout
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SOL_CHAT_ID: ${{ secrets.SOL_CHAT_ID }}
        run: python scripts/model_scout.py

      - name: Commit updated state
        run: |
          git config user.name "guardiao-universo[bot]"
          git config user.email "guardiao@theuniverse"
          git add state/model-state.json
          git diff --cached --quiet || git commit -m "chore: model-state atualizado pelo scout"
          git push || true
