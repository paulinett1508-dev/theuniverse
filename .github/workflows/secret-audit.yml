name: Secret Audit — varredura de conteúdo

# Complementa o secret_exposto nativo (GitHub secret-scanning) com regex de conteúdo,
# pegando segredos custom em todos os repos do universo. Cadência diária (scan é pesado).

on:
  schedule:
    - cron: "30 9 * * *"   # ~06:30 BRT, 1x/dia
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: secret-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rodar varredura de segredos
        env:
          GITHUB_TOKEN: ${{ secrets.UNIVERSE_PAT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SOL_CHAT_ID: ${{ secrets.SOL_CHAT_ID }}
        run: python scripts/secret_scan.py

      - name: Commitar estado (se mudou)
        run: |
          git config user.name  "guardiao-do-universo"
          git config user.email "guardiao@theuniverse.local"
          if [ -n "$(git status --porcelain state/)" ]; then
            git add state/secret-scan-state.json state/posture-status.json
            git commit -m "secret-audit: baseline de segredos + postura (posture-status@1)"
            git push
          else
            echo "Nenhum segredo novo."
          fi
